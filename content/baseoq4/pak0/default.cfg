//
// KEY BINDINGS
//

unbindall

bind	r				_impulse13				// Reload
bind	[				_impulse14				// Next weapon
bind	MWHEELDOWN		_impulse14
bind	]				_impulse15				// Previous weapon
bind	MWHEELUP		_impulse15
bind	f				_impulse50				// Use flashlight

bind	e				_weaponWheel			// Use weapon wheel

bind	1				_impulse0				// Blaster / Gauntlet
bind	2				_impulse1				// Machinegun
bind	3				_impulse2				// Shotgun
bind	4				_impulse3				// HyperBlaster
bind	5				_impulse4				// Grenade Launcher
bind	6				_impulse5				// Nailgun
bind	7				_impulse6				// Rocket Launcher
bind	8				_impulse7				// Railgun
bind	9				_impulse8				// Lightning gun
bind	0				_impulse9				// Dark Matter Gun
bind	-				_impulse10				// Napalm Launcher

//
// GAMEPAD CONTROLS
// SDL gamepads map as:
// JOY1 LB, JOY2 RB, JOY3 A, JOY4 B, JOY5 Y, JOY6 X, JOY7 Start, JOY8 Back,
// JOY9 D-pad Up, JOY10 D-pad Down, JOY11 D-pad Right, JOY12 D-pad Left,
// JOY13 L3, JOY14 R3, JOY15 RT, JOY16 LT, JOY17 Guide, JOY18 Touchpad,
// JOY19 Right paddle 1, JOY20 Left paddle 1, JOY21 Right paddle 2,
// JOY22 Left paddle 2, JOY23-JOY28 extra device buttons, JOY29-JOY32 generic fallback.
// Generic joystick buttons beyond JOY32 continue as AUX1-AUX16.
//

seta	in_toggleZoom		"0"
seta	pm_zoomedSlow		"50"

bind	JOY1			_weaponWheel			// Weapon wheel (LB)
bind	JOY2			_impulse51				// Last weapon (RB)
bind	JOY3			_moveup					// Jump (A)
bind	JOY4			_movedown				// Crouch (B)
bind	JOY5			_impulse50				// Toggle flashlight (Y)
bind	JOY6			_impulse13				// Reload (X)
bind	JOY7			"togglemenu"			// Toggle menu (Start)
bind	JOY8			"togglemenu"			// Toggle menu (Back)
bind	JOY9			_impulse19				// Show objectives / scores
bind	JOY10			centerview				// Center player view
bind	JOY11			_impulse15				// Previous weapon
bind	JOY12			_impulse14				// Next weapon
bind	JOY13			_speed					// Run / walk
bind	JOY14			centerview				// Center player view (R3)
bind	JOY17			"togglemenu"			// Toggle menu (Guide, when delivered by the OS)
bind	JOY18			_impulse19				// Touchpad objectives where available
bind	JOY19			_moveup					// Jump (right paddle 1)
bind	JOY20			_movedown				// Crouch (left paddle 1)
bind	JOY21			_impulse13				// Reload (right paddle 2)
bind	JOY22			_weaponWheel			// Weapon wheel (left paddle 2)
// JOY23-JOY32 and AUX1-AUX16 are available for extra device buttons but left unbound.

bind	JOY15			_attack					// Attack (RT)
bind	JOY16			_zoom					// Aim / zoom (LT)

//
// CHARACTER CONTROLS
//

bind	LEFTCTRL		_attack					// Attack
bind	RIGHTCTRL		_attack					// Attack
bind	MOUSE1			_attack					// Attack

bind	MOUSE2			_zoom					// Zoom view

bind	LEFTALT			_strafe					// Strafe
bind	RIGHTALT		_strafe					// Strafe
bind	LEFTSHIFT		_speed					// Run / walk
bind	RIGHTSHIFT		_speed					// Run / walk

bind	DEL				_lookdown 				// Look down
bind	PGDN			_lookup					// Look up
bind	END				centerview				// Center player view
bind	MOUSE3			_zoom					// Zoom view

bind	c				_movedown				// Move down
bind	KP_INS			_moveup					// Move up
bind	SPACE			_moveup

bind	UPARROW			_forward				// Move forward
bind	w				_forward
bind	DOWNARROW		_back					// Move backward
bind	s				_back
bind	LEFTARROW		_left					// Turn left
bind	RIGHTARROW		_right					// Turn right
bind	a				_moveleft				// Move left
bind	d				_moveright				// Move right

//
// CLIENT ENVIRONMENT COMMANDS
//

bind	PAUSE			"pause"					// Pause game
bind	ESCAPE			"togglemenu"			// Toggle menu screen
bind	~				"toggleconsole"			// Toggle console
bind	"`"				"toggleconsole"
bind	TAB				_impulse19				// Show objectives / scores

//
// MULTIPLAYER KEYS
//
bind	t				"clientmessagemode"		// Send global message
bind	z				_ingameStats			// Ingame multiplayer stat screen
bind	y				"clientmessagemode 1"	// Send team message
bind	KP_ENTER		togglewaitingroom		// Toggle waiting room / spectator for tourney
bind	b				"buymenu"

//
// FUNCTION KEYS
//
bind	F1				voteyes					// Vote yes
bind	F2				voteno					// Vote no
bind	F3				ready					// Ready to play
bind	F5				"savegame quick"		// Quick save
bind	F6				toggleteam				// Toggle team
bind	F7				spectate				// Spectate
bind	F9				"loadgame quick"		// Quick load
bind	F12				screenshot				// Take screenshot

//
// userInfo variables
// These are transfered to multiplayer servers on connecting
// and are available in the main menu gui for modification

setu	ui_name			Player
setu	ui_model		marine
setu	ui_skin			base

//
// serverInfo variables
// These are transfered from multiplayer servers on connecting
// and are available in the main menu gui for modification

sets	si_fragLimit	10
sets	si_timeLimit	0
sets	si_map			mp/q4dm1
sets	si_gameType		dm

seta	g_showHudPopups	0

// takeViewNotes values
sett	viewnotes_names 	"Chuck Nicholson;Gretchen Carlson;Ken Banks;Jeff Dischler;Eric Biessman;Chad Bordwell;Bryan Dube;Ford Dye;Mike Egnew;Mike Ekberg;Chris Foster;Mike Gummelt;Jim Hughes;Kevin Long;Nick Maggiore;Mike Majernik;Nathan McKenzie;Scott McNutt;Corey Peters;Zack Quarles;Mike Renner;Jim Shepard;Matt Vainio;Andrew Weldon;Pat Williams;--Graham Fuchs;--Tim Willits"
sett	viewnotes_categories	"Animation;Art;Bug;Build Notes;Design;Feedback Group 1;Feedback Group 2;Feedback Group 3;Generic;Info;Jump Point;Monster;Scripting;Sound;Suggestion"


