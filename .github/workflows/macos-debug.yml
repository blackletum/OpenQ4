name: macOS Debug

on:
  workflow_dispatch:
    inputs:
      bridge:
        description: "macOS graphics bridge to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - opengl
          - metal
      run_runtime_assetless:
        description: "Try assetless renderer startup probes on the macOS runner"
        required: true
        default: false
        type: boolean
      retention_days:
        description: "Artifact retention days"
        required: true
        default: "14"

permissions:
  contents: read

concurrency:
  group: openq4-macos-debug-${{ github.ref }}-${{ inputs.bridge }}
  cancel-in-progress: false

jobs:
  macos-debug:
    name: macOS ${{ matrix.bridge_label }} Debug
    runs-on: macos-15
    timeout-minutes: 120
    env:
      OPENQ4_GAMELIBS_REPO: ${{ github.workspace }}/../openQ4-GameLibs
    strategy:
      fail-fast: false
      matrix:
        include:
          - bridge_label: OpenGL
            bridge: opengl
            artifact_suffix: opengl
          - bridge_label: Metal
            bridge: metal
            artifact_suffix: metal

    steps:
      - name: Select bridge
        id: select
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ inputs.bridge }}"
          bridge="${{ matrix.bridge }}"
          if [[ "${requested}" != "both" && "${requested}" != "${bridge}" ]]; then
            echo "selected=false" >> "${GITHUB_OUTPUT}"
          else
            echo "selected=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.select.outputs.selected == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch openQ4-GameLibs
        if: steps.select.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/themuffinator/openQ4-GameLibs.git "${OPENQ4_GAMELIBS_REPO}"

      - name: Setup Python
        if: steps.select.outputs.selected == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Meson and Ninja
        if: steps.select.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install meson ninja

      - name: Host diagnostics
        if: steps.select.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Host"
            sw_vers
            uname -a
            echo
            echo "## Xcode"
            xcodebuild -version || true
            xcode-select -p || true
            echo
            echo "## Displays"
            system_profiler SPDisplaysDataType || true
          } | tee macos-debug-host.txt

      - name: Static macOS guards
        if: steps.select.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python tools/tests/macos_renderer_startup_guard.py
          python tools/tests/macos_metal_bridge.py
          python tools/tests/filesystem_case_segments.py
          bash -n tools/macos/guest/openq4-macos-bootstrap.sh
          bash -n tools/macos/guest/openq4-macos-install-quake4-assets.sh
          bash -n tools/macos/guest/openq4-macos-sync-build-test.sh
          python tools/validation/openq4_validate.py push --skip-build --no-install

      - name: Configure
        if: steps.select.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash tools/build/meson_setup.sh setup --wipe builddir . \
            --backend ninja \
            --buildtype=debug \
            --wrap-mode=forcefallback \
            -Dplatform_backend=sdl3 \
            -Dmacos_graphics_bridge=${{ matrix.bridge }}

      - name: Compile
        if: steps.select.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash tools/build/meson_setup.sh compile -C builddir

      - name: Install
        if: steps.select.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash tools/build/meson_setup.sh install -C builddir --no-rebuild --skip-subprojects

      - name: Validate staged payload
        if: steps.select.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python tools/validation/openq4_validate.py push --skip-build --no-install

      - name: Assetless renderer probes
        if: steps.select.outputs.selected == 'true' && inputs.run_runtime_assetless
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python tools/tests/renderer_validation_matrix.py \
            --tiers auto,gl41 \
            --cases tier-auto,tier-gl41,renderer-modern-visible-selftest \
            --timeout 180 \
            --basepath "" \
            --skip-official-pak-validation \
            --output-dir ".tmp/macos-debug-${{ matrix.artifact_suffix }}-renderer"

      - name: Publish debug artifacts
        if: always() && steps.select.outputs.selected == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: macos-debug-${{ matrix.artifact_suffix }}
          path: |
            macos-debug-host.txt
            builddir/meson-logs
            .install
            .home
            .tmp/macos-debug-${{ matrix.artifact_suffix }}-renderer
          if-no-files-found: warn
          retention-days: ${{ fromJSON(inputs.retention_days) }}
          include-hidden-files: true
