name: Manual Releases

on:
  workflow_dispatch:
    inputs:
      bump_mode:
        description: Release bump policy
        required: true
        default: auto
        type: choice
        options:
          - auto
          - major (x..)
          - minor (.x.)
          - patch (..x)
      version_override:
        description: Optional explicit release version (for example 0.1.011)
        required: false
        default: ""
        type: string
      openq4_game_ref:
        description: openQ4-game branch, tag, or full commit SHA to package
        required: true
        default: main
        type: string
      linux_arm64_support_tier:
        description: Linux ARM64 release support tier
        required: true
        default: preview
        type: choice
        options:
          - preview
          - first-class
      linux_arm64_evidence_ref:
        description: Accepted ARM64 evidence branch, tag, or full commit SHA (required for first-class)
        required: false
        default: ""
        type: string
      generate_linux_arm64_evidence_candidate:
        description: Run a non-publishing ARM64 evidence-candidate build from the selected branch
        required: false
        default: false
        type: boolean
      macos_support_tier:
        description: macOS release support tier
        required: true
        default: experimental
        type: choice
        options:
          - experimental
          - first-class

concurrency:
  group: openq4-manual-releases
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      latest_release_tag: ${{ steps.version.outputs.latest_release_tag }}
      latest_release_version: ${{ steps.version.outputs.latest_release_version }}
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_scale: ${{ steps.version.outputs.release_scale }}
      release_reason: ${{ steps.version.outputs.release_reason }}
      bump_mode: ${{ steps.version.outputs.bump_mode }}
      openq4_source_sha: ${{ steps.source_revisions.outputs.openq4_source_sha }}
      source_date_epoch: ${{ steps.source_revisions.outputs.source_date_epoch }}
      openq4_game_ref: ${{ steps.source_revisions.outputs.openq4_game_ref }}
      openq4_game_sha: ${{ steps.source_revisions.outputs.openq4_game_sha }}
      linux_arm64_evidence_sha: ${{ steps.arm64_evidence.outputs.evidence_sha }}
      linux_arm64_archive_sha256: ${{ steps.arm64_evidence.outputs.archive_sha256 }}
      release_matrix: ${{ steps.release_matrix.outputs.release_matrix }}
      linux_arm64_support_tier: ${{ steps.release_matrix.outputs.linux_arm64_support_tier }}
      linux_arm64_release_reason: ${{ steps.release_matrix.outputs.linux_arm64_release_reason }}
      macos_signed_release_enabled: ${{ steps.release_matrix.outputs.macos_signed_release_enabled }}
      macos_support_tier: ${{ steps.release_matrix.outputs.macos_support_tier }}
      macos_release_reason: ${{ steps.release_matrix.outputs.macos_release_reason }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Fetch tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Resolve immutable source revisions
        id: source_revisions
        env:
          INPUT_OPENQ4_GAME_REF: ${{ inputs.openq4_game_ref }}
          INPUT_ARM64_EVIDENCE_CANDIDATE: ${{ inputs.generate_linux_arm64_evidence_candidate }}
          INPUT_ARM64_SUPPORT_TIER: ${{ inputs.linux_arm64_support_tier }}
        shell: bash
        run: |
          set -euo pipefail

          candidate_only="${INPUT_ARM64_EVIDENCE_CANDIDATE}"
          if [ "${candidate_only}" != "true" ] && [ "${candidate_only}" != "false" ]; then
            echo "Invalid ARM64 evidence-candidate selector: ${candidate_only}"
            exit 1
          fi
          if [ "${candidate_only}" = "true" ] && [ "${INPUT_ARM64_SUPPORT_TIER}" != "preview" ]; then
            echo "Linux ARM64 evidence candidates are non-publishing preview-tier builds; got ${INPUT_ARM64_SUPPORT_TIER}."
            exit 1
          fi
          if [ "${candidate_only}" = "false" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Publishing manual releases must be dispatched from refs/heads/main; got ${GITHUB_REF}."
            exit 1
          fi
          if [ "${candidate_only}" = "true" ] && [[ "${GITHUB_REF}" != refs/heads/* ]]; then
            echo "Linux ARM64 evidence candidates must be dispatched from a pushed branch; got ${GITHUB_REF}."
            exit 1
          fi

          openq4_source_sha="$(git rev-parse --verify "${GITHUB_SHA}^{commit}")"
          checkout_sha="$(git rev-parse --verify 'HEAD^{commit}')"
          if [[ ! "${openq4_source_sha}" =~ ^[0-9a-f]{40}$ ]] || [ "${checkout_sha}" != "${openq4_source_sha}" ]; then
            echo "The checked-out openQ4 release candidate does not match triggering GITHUB_SHA=${GITHUB_SHA}."
            exit 1
          fi
          source_date_epoch="$(git show -s --format=%ct "${openq4_source_sha}")"
          if [[ ! "${source_date_epoch}" =~ ^[0-9]{1,12}$ ]]; then
            echo "Triggering openQ4 commit has an invalid source timestamp: ${source_date_epoch}"
            exit 1
          fi

          git fetch --force origin refs/heads/main:refs/remotes/origin/main
          if [ "${candidate_only}" = "true" ]; then
            if ! git merge-base --is-ancestor refs/remotes/origin/main "${openq4_source_sha}"; then
              echo "ARM64 evidence candidate ${openq4_source_sha} must descend from the current origin/main."
              exit 1
            fi
          elif ! git merge-base --is-ancestor "${openq4_source_sha}" refs/remotes/origin/main; then
            echo "Triggering openQ4 commit ${openq4_source_sha} is not a release candidate reachable from origin/main."
            exit 1
          fi

          input_ref="${INPUT_OPENQ4_GAME_REF}"
          if [[ ! "${input_ref}" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]{0,199}$ ]] || \
             [[ "${input_ref}" == *".."* ]] || \
             [[ "${input_ref}" == *"@{"* ]] || \
             [[ "${input_ref}" == *"//"* ]] || \
             [[ "${input_ref}" == */ ]] || \
             [[ "${input_ref}" == *.lock ]]; then
            echo "openq4_game_ref is empty, unsafe, or not a supported Git ref/SHA: ${input_ref@Q}"
            exit 1
          fi

          resolution_repo="$(mktemp -d "${RUNNER_TEMP}/openq4-game-resolution.XXXXXX")"
          trap 'rm -rf "${resolution_repo}"' EXIT
          git -C "${resolution_repo}" init -q
          git -C "${resolution_repo}" remote add origin https://github.com/themuffinator/openQ4-game.git
          git -C "${resolution_repo}" fetch --quiet --no-tags --depth=1 origin "${input_ref}"
          openq4_game_sha="$(git -C "${resolution_repo}" rev-parse --verify 'FETCH_HEAD^{commit}')"
          if [[ ! "${openq4_game_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Resolved openQ4-game revision is not a full immutable commit SHA: ${openq4_game_sha}"
            exit 1
          fi

          {
            echo "openq4_source_sha=${openq4_source_sha}"
            echo "source_date_epoch=${source_date_epoch}"
            echo "openq4_game_ref=${input_ref}"
            echo "openq4_game_sha=${openq4_game_sha}"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "### Release source revisions"
            echo "- openQ4: \`${openq4_source_sha}\` (triggering candidate)"
            echo "- openQ4-game: \`${openq4_game_sha}\` (resolved once from \`${input_ref}\`)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Compute release version
        id: version
        env:
          INPUT_BUMP_MODE: ${{ inputs.bump_mode }}
          INPUT_VERSION_OVERRIDE: ${{ inputs.version_override }}
        shell: bash
        run: |
          set -euo pipefail

          args=(
            --source-root .
            --bump-mode "${INPUT_BUMP_MODE}"
          )

          if [ -n "${INPUT_VERSION_OVERRIDE}" ]; then
            args+=(--version-override "${INPUT_VERSION_OVERRIDE}")
          fi

          python tools/build/openq4_release_version.py "${args[@]}" >> "$GITHUB_OUTPUT"

      - name: Validate release-tag candidate
        env:
          OPENQ4_SOURCE_SHA: ${{ steps.source_revisions.outputs.openq4_source_sha }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            existing_tag_sha="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
            if [ "${existing_tag_sha}" != "${OPENQ4_SOURCE_SHA}" ]; then
              echo "Existing release tag ${RELEASE_TAG} targets ${existing_tag_sha}, not triggering candidate ${OPENQ4_SOURCE_SHA}."
              exit 1
            fi
          fi

      - name: Resolve accepted Linux ARM64 evidence
        if: inputs.linux_arm64_support_tier == 'first-class'
        id: arm64_evidence
        env:
          INPUT_EVIDENCE_REF: ${{ inputs.linux_arm64_evidence_ref }}
          EXPECTED_OPENQ4_COMMIT: ${{ steps.source_revisions.outputs.openq4_source_sha }}
          EXPECTED_OPENQ4_GAME_COMMIT: ${{ steps.source_revisions.outputs.openq4_game_sha }}
          EXPECTED_RELEASE_VERSION: ${{ steps.version.outputs.version }}
          EXPECTED_VERSION_TAG: ${{ steps.version.outputs.version_tag }}
          EXPECTED_RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          evidence_ref="${INPUT_EVIDENCE_REF}"
          if [[ ! "${evidence_ref}" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]{0,199}$ ]] || \
             [[ "${evidence_ref}" == *".."* ]] || \
             [[ "${evidence_ref}" == *"@{"* ]] || \
             [[ "${evidence_ref}" == *"//"* ]] || \
             [[ "${evidence_ref}" == */ ]] || \
             [[ "${evidence_ref}" == *.lock ]]; then
            echo "linux_arm64_evidence_ref is empty, unsafe, or not a supported Git ref/SHA: ${evidence_ref@Q}"
            exit 1
          fi

          evidence_repo="$(mktemp -d "${RUNNER_TEMP}/openq4-arm64-evidence.XXXXXX")"
          evidence_manifest="${RUNNER_TEMP}/linux-arm64-first-class-evidence.toml"
          stock_sp_report="${RUNNER_TEMP}/linux-arm64-stock-sp-report.json"
          dedicated_report="${RUNNER_TEMP}/linux-arm64-dedicated-report.json"
          trap 'rm -rf "${evidence_repo}" "${evidence_manifest}" "${stock_sp_report}" "${dedicated_report}"' EXIT
          git -C "${evidence_repo}" init --quiet
          git -C "${evidence_repo}" remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -C "${evidence_repo}" fetch --quiet --no-tags --depth=1 origin "${evidence_ref}"
          evidence_sha="$(git -C "${evidence_repo}" rev-parse --verify 'FETCH_HEAD^{commit}')"
          if [[ ! "${evidence_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Resolved Linux ARM64 evidence revision is not a full immutable commit SHA: ${evidence_sha}"
            exit 1
          fi

          evidence_path="docs/dev/linux-arm64-first-class-evidence.toml"
          evidence_mode="$(git -C "${evidence_repo}" ls-tree "${evidence_sha}" -- "${evidence_path}" | awk '{print $1}')"
          if [ "${evidence_mode}" != "100644" ]; then
            echo "Accepted Linux ARM64 evidence must be a regular tracked file at ${evidence_path}; mode=${evidence_mode:-missing}."
            exit 1
          fi
          git -C "${evidence_repo}" show "${evidence_sha}:${evidence_path}" > "${evidence_manifest}"

          stock_sp_path="docs/dev/linux-arm64-evidence/stock-sp-report.json"
          dedicated_path="docs/dev/linux-arm64-evidence/dedicated-report.json"
          stock_sp_mode="$(git -C "${evidence_repo}" ls-tree "${evidence_sha}" -- "${stock_sp_path}" | awk '{print $1}')"
          dedicated_mode="$(git -C "${evidence_repo}" ls-tree "${evidence_sha}" -- "${dedicated_path}" | awk '{print $1}')"
          if [ "${stock_sp_mode}" != "100644" ] || [ "${dedicated_mode}" != "100644" ]; then
            echo "Accepted Linux ARM64 runtime reports must be regular tracked files at ${stock_sp_path} and ${dedicated_path}."
            echo "Observed modes: stock_sp=${stock_sp_mode:-missing}, dedicated=${dedicated_mode:-missing}."
            exit 1
          fi
          git -C "${evidence_repo}" show "${evidence_sha}:${stock_sp_path}" > "${stock_sp_report}"
          git -C "${evidence_repo}" show "${evidence_sha}:${dedicated_path}" > "${dedicated_report}"

          archive_sha256="$(
            python tools/build/verify_linux_arm64_release_evidence.py validate \
              --manifest "${evidence_manifest}" \
              --stock-sp-report "${stock_sp_report}" \
              --dedicated-report "${dedicated_report}" \
              --expected-openq4-commit "${EXPECTED_OPENQ4_COMMIT}" \
              --expected-openq4-game-commit "${EXPECTED_OPENQ4_GAME_COMMIT}" \
              --expected-release-version "${EXPECTED_RELEASE_VERSION}" \
              --expected-version-tag "${EXPECTED_VERSION_TAG}" \
              --expected-release-tag "${EXPECTED_RELEASE_TAG}" \
              --expected-package-filename "openq4-${EXPECTED_VERSION_TAG}-linux-arm64.tar.xz" \
              --print-archive-sha256
          )"
          if [[ ! "${archive_sha256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Accepted Linux ARM64 evidence produced an invalid archive SHA-256: ${archive_sha256@Q}"
            exit 1
          fi

          echo "evidence_sha=${evidence_sha}" >> "${GITHUB_OUTPUT}"
          echo "archive_sha256=${archive_sha256}" >> "${GITHUB_OUTPUT}"
          {
            echo "### Linux ARM64 accepted evidence"
            echo "- Evidence commit: \`${evidence_sha}\`"
            echo "- Candidate: \`${EXPECTED_OPENQ4_COMMIT}\` + \`${EXPECTED_OPENQ4_GAME_COMMIT}\`"
            echo "- Package: \`openq4-${EXPECTED_VERSION_TAG}-linux-arm64.tar.xz\`"
            echo "- Archive SHA-256: \`${archive_sha256}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate Discord webhook secret
        if: inputs.generate_linux_arm64_evidence_candidate == false
        env:
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_RELEASE_WEBHOOK}" ]; then
            echo "DISCORD_RELEASE_WEBHOOK must be configured as a repository secret before publishing an openQ4 release."
            exit 1
          fi

      - name: Build release matrix
        id: release_matrix
        env:
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
          OPENQ4_LINUX_ARM64_SUPPORT_TIER: ${{ inputs.linux_arm64_support_tier }}
          OPENQ4_LINUX_ARM64_EVIDENCE_SHA: ${{ steps.arm64_evidence.outputs.evidence_sha }}
          OPENQ4_ARM64_EVIDENCE_CANDIDATE: ${{ inputs.generate_linux_arm64_evidence_candidate }}
          OPENQ4_RELEASE_VERSION_TAG: ${{ steps.version.outputs.version_tag }}
          OPENQ4_MACOS_SUPPORT_TIER: ${{ inputs.macos_support_tier }}
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import pathlib
          import re

          linux_arm64_support_tier = os.environ.get(
              "OPENQ4_LINUX_ARM64_SUPPORT_TIER", "preview"
          ).strip() or "preview"
          if linux_arm64_support_tier not in {"preview", "first-class"}:
              raise SystemExit(
                  f"Unsupported Linux ARM64 support tier: {linux_arm64_support_tier}"
              )
          evidence_candidate_value = os.environ.get(
              "OPENQ4_ARM64_EVIDENCE_CANDIDATE", "false"
          ).strip().lower()
          if evidence_candidate_value not in {"true", "false"}:
              raise SystemExit(
                  "Unsupported Linux ARM64 evidence-candidate selector: "
                  + evidence_candidate_value
              )
          linux_arm64_evidence_candidate = evidence_candidate_value == "true"
          if linux_arm64_evidence_candidate and linux_arm64_support_tier != "preview":
              raise SystemExit(
                  "Linux ARM64 evidence-candidate runs are non-publishing preview-tier "
                  "builds; rerun with linux_arm64_support_tier=preview."
              )
          if linux_arm64_support_tier == "first-class":
              linux_arm64_evidence_sha = os.environ.get(
                  "OPENQ4_LINUX_ARM64_EVIDENCE_SHA", ""
              ).strip()
              if re.fullmatch(r"[0-9a-f]{40}", linux_arm64_evidence_sha) is None:
                  raise SystemExit(
                      "First-class Linux ARM64 releases require a resolved immutable "
                      "accepted-evidence commit. Provide linux_arm64_evidence_ref or "
                      "rerun with linux_arm64_support_tier=preview."
                  )
              release_version_tag = os.environ.get(
                  "OPENQ4_RELEASE_VERSION_TAG", ""
              ).strip()
              if (
                  not release_version_tag
                  or pathlib.Path(release_version_tag).name != release_version_tag
                  or ".." in release_version_tag
              ):
                  raise SystemExit(
                      "First-class Linux ARM64 release validation requires a safe "
                      "release version tag."
                  )
              curated_release_note_candidates = (
                  pathlib.Path("docs/dev/releases") / f"v{release_version_tag}.md",
                  pathlib.Path("docs/dev/releases") / f"{release_version_tag}.md",
              )
              selected_curated_release_notes = next(
                  (
                      path
                      for path in curated_release_note_candidates
                      if path.is_file()
                  ),
                  None,
              )
              user_facing_linux_arm64_docs = [
                  "README.md",
                  "docs/user/getting-started.md",
                  "assets/release/README.html",
              ]
              if selected_curated_release_notes is not None:
                  user_facing_linux_arm64_docs.append(
                      selected_curated_release_notes.as_posix()
                  )
              linux_arm64_preview_claim_pattern = re.compile(
                  r"(?:linux[\s_-]+arm64.{0,240}\bpreview\b"
                  r"|\bpreview\b.{0,240}linux[\s_-]+arm64)",
                  flags=re.IGNORECASE | re.DOTALL,
              )
              stale_user_preview_claims = []
              for path in user_facing_linux_arm64_docs:
                  contents = pathlib.Path(path).read_text(encoding="utf-8")
                  match = linux_arm64_preview_claim_pattern.search(contents)
                  if match is not None:
                      excerpt = " ".join(match.group(0).split())
                      stale_user_preview_claims.append(f"{path}: {excerpt}")
              if stale_user_preview_claims:
                  raise SystemExit(
                      "First-class Linux ARM64 user-facing preview claims still remain: "
                      + "; ".join(stale_user_preview_claims)
                      + ". Update the front-door support claims or rerun with "
                      "linux_arm64_support_tier=preview."
                  )
          linux_arm64_label_suffix = (
              " (preview)" if linux_arm64_support_tier == "preview" else ""
          )

          matrix = [
              {
                  "os": "windows-2025",
                  "platform": "windows",
                  "label": "Windows x64",
                  "binary_arch": "x64",
                  "platform_backend": "sdl3",
                  "macos_graphics_bridge": "opengl",
                  "macos_openal_provider": "apple_framework",
                  "package_suffix": "",
                  "archive_format": "zip",
                  "archive_ext": ".zip",
              },
              {
                  "os": "windows-11-arm",
                  "platform": "windows",
                  "label": "Windows ARM64",
                  "binary_arch": "arm64",
                  "platform_backend": "sdl3",
                  "macos_graphics_bridge": "opengl",
                  "macos_openal_provider": "apple_framework",
                  "package_suffix": "",
                  "archive_format": "zip",
                  "archive_ext": ".zip",
              },
              {
                  "os": "ubuntu-24.04",
                  "platform": "linux",
                  "label": "Linux x64",
                  "binary_arch": "x64",
                  "platform_backend": "sdl3",
                  "macos_graphics_bridge": "opengl",
                  "macos_openal_provider": "apple_framework",
                  "package_suffix": "",
                  "archive_format": "tar.xz",
                  "archive_ext": ".tar.xz",
              },
              {
                  "os": "ubuntu-24.04-arm",
                  "platform": "linux",
                  "label": f"Linux ARM64{linux_arm64_label_suffix}",
                  "binary_arch": "arm64",
                  "platform_backend": "sdl3",
                  "macos_graphics_bridge": "opengl",
                  "macos_openal_provider": "apple_framework",
                  "package_suffix": (
                      "-preview" if linux_arm64_support_tier == "preview" else ""
                  ),
                  "archive_format": "tar.xz",
                  "archive_ext": ".tar.xz",
              },
          ]

          required_macos_secrets = (
              "MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64",
              "MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD",
              "MACOS_DEVELOPER_ID_APPLICATION_IDENTITY",
              "MACOS_NOTARY_APPLE_ID",
              "MACOS_NOTARY_TEAM_ID",
              "MACOS_NOTARY_APP_PASSWORD",
          )
          missing_macos_secrets = [
              secret_name
              for secret_name in required_macos_secrets
              if not os.environ.get(secret_name)
          ]
          macos_support_tier = os.environ.get("OPENQ4_MACOS_SUPPORT_TIER", "experimental").strip() or "experimental"
          if macos_support_tier not in {"experimental", "first-class"}:
              raise SystemExit(f"Unsupported macOS support tier: {macos_support_tier}")
          if (
              not linux_arm64_evidence_candidate
              and macos_support_tier == "first-class"
              and missing_macos_secrets
          ):
              raise SystemExit(
                  "First-class macOS releases require signed/notarized DMGs; "
                  "missing Apple signing/notary repository secrets: "
                  + ", ".join(missing_macos_secrets)
              )
          if not linux_arm64_evidence_candidate and macos_support_tier == "first-class":
              evidence_path = pathlib.Path("docs/dev/macos-signoff-evidence.md")
              evidence = evidence_path.read_text(encoding="utf-8")
              incomplete_evidence_markers = [
                  marker
                  for marker in (
                      "Evidence status: pending",
                      "- [ ] No completed macOS first-class support evidence is recorded yet.",
                  )
                  if marker in evidence
              ]
              if incomplete_evidence_markers:
                  raise SystemExit(
                      "First-class macOS releases require completed signoff evidence in "
                      f"{evidence_path}, but it still contains: "
                      + "; ".join(repr(marker) for marker in incomplete_evidence_markers)
                      + ". Validate the signoff archive and record it with "
                      "tools/macos/record_signoff_evidence.py --update-index, or rerun "
                      "with macos_support_tier=experimental."
                  )
          macos_signed_release_enabled = not missing_macos_secrets
          macos_release_mode = "signed" if macos_signed_release_enabled else "unsigned"
          macos_archive_format = "dmg" if macos_signed_release_enabled else "tar.gz"
          macos_archive_ext = ".dmg" if macos_signed_release_enabled else ".tar.gz"
          macos_unsigned_suffix = "" if macos_signed_release_enabled else "-unsigned"
          macos_unsigned_label = "" if macos_signed_release_enabled else " (unsigned)"

          matrix.extend(
              [
                  {
                      "os": "macos-15",
                      "platform": "macos",
                      "label": f"macOS ARM64 OpenGL{macos_unsigned_label}",
                      "binary_arch": "arm64",
                      "platform_backend": "sdl3",
                      "macos_graphics_bridge": "opengl",
                      "macos_openal_provider": "apple_framework",
                      "macos_release_mode": macos_release_mode,
                      "package_suffix": f"-opengl{macos_unsigned_suffix}",
                      "archive_format": macos_archive_format,
                      "archive_ext": macos_archive_ext,
                  },
                  {
                      "os": "macos-15",
                      "platform": "macos",
                      "label": f"macOS ARM64 Metal{macos_unsigned_label}",
                      "binary_arch": "arm64",
                      "platform_backend": "sdl3",
                      "macos_graphics_bridge": "metal",
                      "macos_openal_provider": "apple_framework",
                      "macos_release_mode": macos_release_mode,
                      "package_suffix": f"-metal{macos_unsigned_suffix}",
                      "archive_format": macos_archive_format,
                      "archive_ext": macos_archive_ext,
                  },
              ]
          )

          if linux_arm64_evidence_candidate:
              matrix = [
                  entry
                  for entry in matrix
                  if entry["platform"] == "linux" and entry["binary_arch"] == "arm64"
              ]
              if len(matrix) != 1:
                  raise SystemExit(
                      "Linux ARM64 evidence-candidate matrix did not resolve to exactly one job."
                  )
              matrix[0]["label"] = "Linux ARM64 first-class evidence candidate"
              matrix[0]["package_suffix"] = ""

          if macos_signed_release_enabled:
              macos_release_reason = (
                  f"macOS {macos_support_tier} signed/notarized DMG release artifacts enabled."
              )
          else:
              macos_release_reason = (
                  "Experimental macOS unsigned/unnotarized tar.gz release artifacts enabled as fallback output "
                  "because Apple signing/notary repository secrets are not configured: "
                  + ", ".join(missing_macos_secrets)
              )

          if linux_arm64_evidence_candidate:
              linux_arm64_release_reason = (
                  "Non-publishing Linux ARM64 first-class evidence candidate enabled; "
                  "the exact archive and pending manifest are retained only as workflow evidence."
              )
          elif linux_arm64_support_tier == "preview":
              linux_arm64_release_reason = (
                  "Linux ARM64 preview artifacts enabled. First-class publication remains "
                  "gated on accepted real-hardware native-Wayland SP/MP, dedicated-server, "
                  "audio, input, display, and package evidence."
              )
          else:
              linux_arm64_release_reason = (
                  "Linux ARM64 first-class artifacts enabled from accepted signoff evidence "
                  f"at immutable evidence commit {linux_arm64_evidence_sha}."
              )

          print(f"linux_arm64_support_tier={linux_arm64_support_tier}")
          print(f"linux_arm64_release_reason={linux_arm64_release_reason}")
          print("macos_signed_release_enabled=" + ("true" if macos_signed_release_enabled else "false"))
          print(f"macos_support_tier={macos_support_tier}")
          print(f"macos_release_reason={macos_release_reason}")
          print("release_matrix=" + json.dumps({"include": matrix}, separators=(",", ":")))
          PY

  builds:
    name: ${{ matrix.label }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      OPENQ4_GAMELIBS_REPO: ${{ github.workspace }}/../openQ4-game
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.metadata.outputs.release_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ needs.metadata.outputs.openq4_source_sha }}

      - name: Fetch pinned openQ4-game
        shell: bash
        run: |
          set -euo pipefail

          expected_openq4_sha="${{ needs.metadata.outputs.openq4_source_sha }}"
          expected_game_sha="${{ needs.metadata.outputs.openq4_game_sha }}"
          actual_openq4_sha="$(git rev-parse --verify 'HEAD^{commit}')"
          if [ "${actual_openq4_sha}" != "${expected_openq4_sha}" ]; then
            echo "openQ4 checkout ${actual_openq4_sha} does not match metadata SHA ${expected_openq4_sha}."
            exit 1
          fi
          if [ -e "${OPENQ4_GAMELIBS_REPO}" ]; then
            echo "Refusing to reuse an existing openQ4-game checkout: ${OPENQ4_GAMELIBS_REPO}"
            exit 1
          fi

          mkdir -p "$(dirname "${OPENQ4_GAMELIBS_REPO}")"
          git init --quiet "${OPENQ4_GAMELIBS_REPO}"
          git -C "${OPENQ4_GAMELIBS_REPO}" remote add origin https://github.com/themuffinator/openQ4-game.git
          git -C "${OPENQ4_GAMELIBS_REPO}" fetch --quiet --no-tags --depth=1 origin "${expected_game_sha}"
          git -C "${OPENQ4_GAMELIBS_REPO}" checkout --quiet --detach "${expected_game_sha}"
          actual_game_sha="$(git -C "${OPENQ4_GAMELIBS_REPO}" rev-parse --verify 'HEAD^{commit}')"
          if [ "${actual_game_sha}" != "${expected_game_sha}" ]; then
            echo "openQ4-game checkout ${actual_game_sha} does not match metadata SHA ${expected_game_sha}."
            exit 1
          fi
          if [ -n "$(git -C "${OPENQ4_GAMELIBS_REPO}" status --porcelain --untracked-files=all)" ]; then
            echo "Pinned openQ4-game checkout is unexpectedly dirty."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Meson and Ninja
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson ninja markdown

      - name: Show release metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "Configured repo version: ${{ needs.metadata.outputs.current_version }}"
          echo "Latest release tag: ${{ needs.metadata.outputs.latest_release_tag }}"
          echo "Release version: ${{ needs.metadata.outputs.version }}"
          echo "Release tag: ${{ needs.metadata.outputs.release_tag }}"
          echo "Release scale: ${{ needs.metadata.outputs.release_scale }}"
          echo "Release reason: ${{ needs.metadata.outputs.release_reason }}"
          echo "openQ4 source SHA: ${{ needs.metadata.outputs.openq4_source_sha }}"
          echo "openQ4-game requested ref: ${{ needs.metadata.outputs.openq4_game_ref }}"
          echo "openQ4-game resolved SHA: ${{ needs.metadata.outputs.openq4_game_sha }}"

      - name: Install Linux native dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y \
              binutils \
              desktop-file-utils \
              libasound2-dev \
              libdbus-1-dev \
              libdecor-0-dev \
              libdrm-dev \
              libegl1-mesa-dev \
              libfribidi-dev \
              libgbm-dev \
              libgl1-mesa-dri \
              libgl1-mesa-dev \
              libglx-mesa0 \
              libibus-1.0-dev \
              libjack-dev \
              libopenal-dev \
              libpipewire-0.3-dev \
              libpulse-dev \
              libsndio-dev \
              libthai-dev \
              libudev-dev \
              libwayland-dev \
              libx11-dev \
              libxcursor-dev \
              libxext-dev \
              libxfixes-dev \
              libxi-dev \
              libxkbcommon-dev \
              libxrandr-dev \
              libxss-dev \
              libxtst-dev \
              libxxf86dga-dev \
              libxxf86vm-dev \
              weston \
              xauth \
              xvfb; then
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to install Linux native dependencies after ${attempt} attempts."
              exit 1
            fi

            echo "Linux dependency installation attempt ${attempt} failed; retrying in 10 seconds..."
            sleep 10
          done

      - name: Install macOS native dependencies
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          echo "Using bundled Meson fallbacks for macOS third-party libraries."

      - name: Prepare OpenAL Soft (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $outputRoot = Join-Path $env:GITHUB_WORKSPACE ".tmp/openal-soft-${{ matrix.binary_arch }}"
          $env:OPENQ4_VS_TARGET_ARCH = "${{ matrix.binary_arch }}"
          powershell -ExecutionPolicy Bypass -File tools/build/prepare_windows_openal.ps1 -Architecture "${{ matrix.binary_arch }}" -OutputRoot $outputRoot
          "OPENQ4_OPENAL_ROOT=$outputRoot" >> $env:GITHUB_ENV

      - name: Build and install (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:OPENQ4_SKIP_GAMELIBS_SYNC = "1"
          $env:OPENQ4_VS_TARGET_ARCH = "${{ matrix.binary_arch }}"

          $setupArgs = @(
            "setup",
            "--wipe",
            "builddir",
            ".",
            "--backend",
            "ninja",
            "--buildtype=debugoptimized",
            "-Db_ndebug=true",
            "--wrap-mode=forcefallback",
            "-Dplatform_backend=${{ matrix.platform_backend }}",
            "-Dmacos_graphics_bridge=${{ matrix.macos_graphics_bridge }}",
            "-Dversion_track=stable",
            "-Dversion_base_override=${{ needs.metadata.outputs.version }}"
          )
          if (-not [string]::IsNullOrWhiteSpace($env:OPENQ4_OPENAL_ROOT)) {
            $setupArgs += "-Dopenal_root_override=$env:OPENQ4_OPENAL_ROOT"
          }

          powershell -ExecutionPolicy Bypass -File tools/build/meson_setup.ps1 @setupArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          powershell -ExecutionPolicy Bypass -File tools/build/meson_setup.ps1 compile -C builddir
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          powershell -ExecutionPolicy Bypass -File tools/build/meson_setup.ps1 install -C builddir --no-rebuild --skip-subprojects
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build and install (Linux/macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          export OPENQ4_SKIP_GAMELIBS_SYNC=1

          if [ "${{ matrix.platform }}" = "linux" ]; then
            export SOURCE_DATE_EPOCH="${{ needs.metadata.outputs.source_date_epoch }}"
          fi

          if [ "${{ matrix.platform }}" = "macos" ]; then
            # Keep Meson subprojects (SDL3, GLEW, stb_vorbis) on the same macOS 11.0
            # floor as the main project's -mmacosx-version-min=11.0 flags.
            export MACOSX_DEPLOYMENT_TARGET=11.0
          fi

          setup_args=(
            setup
            --wipe
            builddir
            .
            --backend
            ninja
            --buildtype=debugoptimized
            -Db_ndebug=true
            --wrap-mode=forcefallback
            "-Dplatform_backend=${{ matrix.platform_backend }}"
            "-Dmacos_graphics_bridge=${{ matrix.macos_graphics_bridge }}"
            "-Dmacos_openal_provider=${{ matrix.macos_openal_provider }}"
            -Dversion_track=stable
            "-Dversion_base_override=${{ needs.metadata.outputs.version }}"
          )
          if [ "${{ matrix.platform }}" = "linux" ]; then
            setup_args+=("-Dlinux_x11=enabled")
          fi

          bash tools/build/meson_setup.sh "${setup_args[@]}"
          bash tools/build/meson_setup.sh compile -C builddir
          bash tools/build/meson_setup.sh install -C builddir --no-rebuild --skip-subprojects

      - name: Verify checked-out and staged source provenance
        shell: bash
        run: |
          set -euo pipefail
          python tools/build/verify_release_source_provenance.py \
            --project-root "${GITHUB_WORKSPACE}" \
            --gamelibs-root "${OPENQ4_GAMELIBS_REPO}" \
            --stage-manifest "${GITHUB_WORKSPACE}/.tmp/gamelibs_stage/openq4_gamelibs_stage_manifest.json" \
            --expected-project-commit "${{ needs.metadata.outputs.openq4_source_sha }}" \
            --expected-gamelibs-commit "${{ needs.metadata.outputs.openq4_game_sha }}"

      - name: Validate staged payload
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d ".install/baseoq4" ]; then
            echo "Staged baseoq4 payload directory is missing."
            exit 1
          fi

          has_payload_files="$(find ".install/baseoq4" -type f -print -quit 2>/dev/null || true)"
          if [ -z "${has_payload_files}" ]; then
            echo "Staged baseoq4 payload directory has no files."
            exit 1
          fi

          if [ "${{ matrix.platform }}" = "linux" ]; then
            if [ ! -f ".install/share/applications/openq4.desktop" ]; then
              echo "Missing Linux desktop entry in staged payload."
              exit 1
            fi
            if [ ! -f ".install/share/icons/hicolor/256x256/apps/openq4.png" ]; then
              echo "Missing Linux 256x256 icon in staged payload."
              exit 1
            fi
          fi

          if [ "${{ matrix.platform }}" = "macos" ]; then
            required_macos_payload=(
              ".install/openQ4-client_${{ matrix.binary_arch }}"
              ".install/openQ4-ded_${{ matrix.binary_arch }}"
              ".install/baseoq4/game-sp_${{ matrix.binary_arch }}.dylib"
              ".install/baseoq4/game-mp_${{ matrix.binary_arch }}.dylib"
              ".install/collect_macos_support_info.sh"
              ".install/openQ4.icns"
              ".install/assets/splash/quake4_rt_bitmap_4001.bmp"
            )

            for payload in "${required_macos_payload[@]}"; do
              if [ ! -f "${payload}" ]; then
                echo "Missing macOS staged payload file: ${payload}"
                exit 1
              fi
            done

            for binary in ".install/openQ4-client_${{ matrix.binary_arch }}" ".install/openQ4-ded_${{ matrix.binary_arch }}" ".install/collect_macos_support_info.sh"; do
              if [ ! -x "${binary}" ]; then
                echo "Missing executable bit on macOS staged binary: ${binary}"
                exit 1
              fi
            done

            shopt -s nullglob
            bad_macos_modules=(
              .install/baseoq4/game-sp_*.dll
              .install/baseoq4/game-sp_*.so
              .install/baseoq4/game-mp_*.dll
              .install/baseoq4/game-mp_*.so
            )
            shopt -u nullglob
            if [ "${#bad_macos_modules[@]}" -ne 0 ]; then
              echo "macOS staged payload contains non-dylib game modules:"
              printf '  - %s\n' "${bad_macos_modules[@]}"
              exit 1
            fi
            expected_macos_root_binaries=(
              ".install/openQ4-client_${{ matrix.binary_arch }}"
              ".install/openQ4-ded_${{ matrix.binary_arch }}"
            )
            for staged_binary in .install/openQ4-client_* .install/openQ4-ded_*; do
              [ -e "${staged_binary}" ] || continue
              matched=0
              for expected_binary in "${expected_macos_root_binaries[@]}"; do
                if [ "${staged_binary}" = "${expected_binary}" ]; then
                  matched=1
                  break
                fi
              done
              if [ "${matched}" -eq 0 ]; then
                echo "macOS staged payload contains stale or mismatched root engine binary: ${staged_binary}"
                exit 1
              fi
            done
            expected_macos_game_modules=(
              ".install/baseoq4/game-sp_${{ matrix.binary_arch }}.dylib"
              ".install/baseoq4/game-mp_${{ matrix.binary_arch }}.dylib"
            )
            for staged_module in .install/baseoq4/game-sp_*.dylib .install/baseoq4/game-mp_*.dylib; do
              [ -e "${staged_module}" ] || continue
              matched=0
              for expected_module in "${expected_macos_game_modules[@]}"; do
                if [ "${staged_module}" = "${expected_module}" ]; then
                  matched=1
                  break
                fi
              done
              if [ "${matched}" -eq 0 ]; then
                echo "macOS staged payload contains stale or mismatched game module: ${staged_module}"
                exit 1
              fi
            done
          fi

      - name: Validate Linux staged ELF/package
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          python tools/validation/openq4_validate.py push \
            --skip-build \
            --install \
            --skip-python-tests

      - name: Prepare Linux debug symbols
        if: matrix.platform == 'linux'
        id: linux_symbols
        shell: bash
        run: |
          set -euo pipefail

          symbols_stem="openq4-${{ needs.metadata.outputs.version_tag }}-linux-${{ matrix.binary_arch }}${{ matrix.package_suffix }}-debugsymbols"
          symbols_dir="${RUNNER_TEMP}/${symbols_stem}"
          symbols_archive="${RUNNER_TEMP}/${symbols_stem}.tar.xz"
          rm -rf "${symbols_dir}" "${symbols_archive}"
          mkdir -p "${symbols_dir}/baseoq4"

          binaries=(
            ".install/openQ4-client_${{ matrix.binary_arch }}"
            ".install/openQ4-ded_${{ matrix.binary_arch }}"
            ".install/baseoq4/game-sp_${{ matrix.binary_arch }}.so"
            ".install/baseoq4/game-mp_${{ matrix.binary_arch }}.so"
          )

          for binary in "${binaries[@]}"; do
            if [ ! -f "${binary}" ]; then
              echo "Required Linux binary for debug-symbol split is missing: ${binary}"
              exit 1
            fi

            relative_path="${binary#.install/}"
            debug_file="${symbols_dir}/${relative_path}.debug"
            mkdir -p "$(dirname "${debug_file}")"

            binary_abs="$(pwd -P)/${binary#./}"
            debug_basename="$(basename "${debug_file}")"

            objcopy --only-keep-debug "${binary_abs}" "${debug_file}"
            objcopy --strip-debug "${binary_abs}"
            (
              cd "$(dirname "${debug_file}")"
              objcopy --add-gnu-debuglink="${debug_basename}" "${binary_abs}"
            )
          done

          tar -C "${symbols_dir}" -cJf "${symbols_archive}" .
          echo "debug_symbols_dir=${symbols_dir}" >> "$GITHUB_OUTPUT"
          echo "debug_symbols_path=${symbols_archive}" >> "$GITHUB_OUTPUT"

      - name: Validate stripped Linux ELFs and detached symbols
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          python tools/build/verify_linux_release_artifacts.py split \
            --runtime-root "${GITHUB_WORKSPACE}/.install" \
            --symbols-root "${{ steps.linux_symbols.outputs.debug_symbols_dir }}" \
            --arch "${{ matrix.binary_arch }}"

      - name: Validate post-strip Linux release client under Wayland and X11
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          runtime_root="${GITHUB_WORKSPACE}/.tmp/release-runtime/${{ matrix.binary_arch }}"
          rm -rf "${runtime_root}"
          mkdir -p "${runtime_root}/wayland" "${runtime_root}/x11"

          sdl_config="$(find builddir -type f -name SDL_build_config.h -print -quit)"
          if [ -z "${sdl_config}" ]; then
            echo "Bundled SDL build configuration was not produced."
            exit 1
          fi
          case "${sdl_config}" in
            builddir/subprojects/*/SDL_build_config.h) ;;
            *)
              echo "Release SDL configuration did not come from the bundled fallback: ${sdl_config}"
              exit 1
              ;;
          esac
          cp "${sdl_config}" "${runtime_root}/SDL_build_config.h"
          grep -F '#define SDL_VIDEO_DRIVER_WAYLAND 1' "${sdl_config}" >/dev/null
          grep -F '#define SDL_VIDEO_DRIVER_X11 1' "${sdl_config}" >/dev/null

          set +e
          (
            set -euo pipefail

            export XDG_RUNTIME_DIR="${runtime_root}/wayland/xdg-runtime"
            mkdir -p "${XDG_RUNTIME_DIR}"
            chmod 700 "${XDG_RUNTIME_DIR}"

            weston_log="${runtime_root}/wayland/weston.log"
            weston --backend=headless-backend.so --socket=openq4-release-wayland --idle-time=0 --no-config >"${weston_log}" 2>&1 &
            weston_pid=$!
            cleanup() {
              status=$?
              kill "${weston_pid}" >/dev/null 2>&1 || true
              wait "${weston_pid}" >/dev/null 2>&1 || true
              if [ "${status}" -ne 0 ] && [ -f "${weston_log}" ]; then
                echo "Weston diagnostics:"
                cat "${weston_log}"
              fi
              exit "${status}"
            }
            trap cleanup EXIT

            for attempt in {1..30}; do
              if [ -S "${XDG_RUNTIME_DIR}/openq4-release-wayland" ]; then
                break
              fi
              sleep 1
            done
            if [ ! -S "${XDG_RUNTIME_DIR}/openq4-release-wayland" ]; then
              echo "Weston did not create the release-test Wayland socket."
              exit 1
            fi

            export WAYLAND_DISPLAY=openq4-release-wayland
            export SDL_VIDEO_DRIVER=wayland
            export SDL_VIDEODRIVER=wayland
            export LIBGL_ALWAYS_SOFTWARE=1
            unset DISPLAY

            python tools/tests/renderer_validation_matrix.py \
              --cases sdl3-wayland-window-lifecycle \
              --tiers auto \
              --timeout 90 \
              --basepath "" \
              --savepath "${runtime_root}/wayland/save" \
              --skip-official-pak-validation \
              --output-dir "${runtime_root}/wayland/report"
          )
          wayland_status=$?

          env -u WAYLAND_DISPLAY \
            LIBGL_ALWAYS_SOFTWARE=1 \
            SDL_VIDEO_DRIVER=x11 \
            SDL_VIDEODRIVER=x11 \
            xvfb-run -a --error-file="${runtime_root}/x11/xvfb.log" \
            python tools/tests/renderer_validation_matrix.py \
              --cases sdl3-x11-window-lifecycle \
              --tiers auto \
              --timeout 90 \
              --basepath "" \
              --savepath "${runtime_root}/x11/save" \
              --skip-official-pak-validation \
              --output-dir "${runtime_root}/x11/report"
          x11_status=$?
          set -e

          if [ "${wayland_status}" -ne 0 ] || [ "${x11_status}" -ne 0 ]; then
            echo "Post-strip Linux release runtime validation failed: Wayland=${wayland_status}, X11=${x11_status}."
            exit 1
          fi

      - name: Publish Linux release runtime diagnostics
        if: ${{ failure() && matrix.platform == 'linux' }}
        uses: actions/upload-artifact@v6
        with:
          name: openq4-release-${{ needs.metadata.outputs.version_tag }}-linux-${{ matrix.binary_arch }}${{ matrix.package_suffix }}-runtime-diagnostics
          path: .tmp/release-runtime/${{ matrix.binary_arch }}
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Import macOS Developer ID certificate
        if: matrix.platform == 'macos' && matrix.macos_release_mode == 'signed'
        id: macos_signing
        env:
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64
            MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD
            MACOS_DEVELOPER_ID_APPLICATION_IDENTITY
            MACOS_NOTARY_APPLE_ID
            MACOS_NOTARY_TEAM_ID
            MACOS_NOTARY_APP_PASSWORD
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "${var_name} must be configured before publishing macOS release packages."
              exit 1
            fi
          done

          keychain_path="${RUNNER_TEMP}/openq4-release-signing.keychain-db"
          certificate_path="${RUNNER_TEMP}/developer-id-application.p12"
          keychain_password="$(openssl rand -hex 24)"
          notary_profile="openq4-release-notary"

          printf '%s' "${MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64}" | base64 -D > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -k "${keychain_path}" \
            -P "${MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign
          # Keychain paths can contain spaces; keep them as array elements
          # instead of relying on word splitting. macOS runners ship bash 3.2,
          # so use a while-read loop instead of mapfile.
          existing_keychains=()
          while IFS= read -r keychain_line; do
            if [ -n "${keychain_line}" ]; then
              existing_keychains+=("${keychain_line}")
            fi
          done < <(security list-keychains -d user | sed -e 's/^[[:space:]]*"//' -e 's/"[[:space:]]*$//')
          security list-keychains -d user -s "${keychain_path}" "${existing_keychains[@]}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_path}"

          xcrun notarytool store-credentials "${notary_profile}" \
            --apple-id "${MACOS_NOTARY_APPLE_ID}" \
            --team-id "${MACOS_NOTARY_TEAM_ID}" \
            --password "${MACOS_NOTARY_APP_PASSWORD}" \
            --keychain "${keychain_path}"

          security find-identity -v -p codesigning "${keychain_path}" | grep -F "${MACOS_DEVELOPER_ID_APPLICATION_IDENTITY}" >/dev/null
          echo "identity=${MACOS_DEVELOPER_ID_APPLICATION_IDENTITY}" >> "$GITHUB_OUTPUT"
          echo "keychain_path=${keychain_path}" >> "$GITHUB_OUTPUT"
          echo "notary_profile=${notary_profile}" >> "$GITHUB_OUTPUT"

      - name: Prepare package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_args=(
            --platform "${{ matrix.platform }}"
            --arch "${{ matrix.binary_arch }}"
            --version "${{ needs.metadata.outputs.version }}"
            --version-tag "${{ needs.metadata.outputs.version_tag }}"
            --archive-format "${{ matrix.archive_format }}"
            --package-suffix="${{ matrix.package_suffix }}"
            --source-root "${GITHUB_WORKSPACE}"
            --output-dir "${RUNNER_TEMP}"
          )

          if [ "${{ matrix.platform }}" = "macos" ]; then
            if [ "${{ matrix.macos_release_mode }}" = "signed" ]; then
              package_args+=(
                --macos-signing-mode developer-id
                --macos-code-sign-identity "${{ steps.macos_signing.outputs.identity }}"
                --macos-notarize
                --macos-notary-keychain-profile "${{ steps.macos_signing.outputs.notary_profile }}"
                --macos-notary-keychain "${{ steps.macos_signing.outputs.keychain_path }}"
              )
            else
              package_args+=(--macos-signing-mode ad-hoc)
            fi
          fi

          python tools/build/package_release.py "${package_args[@]}"

          archive_path="${RUNNER_TEMP}/openq4-${{ needs.metadata.outputs.version_tag }}-${{ matrix.platform }}-${{ matrix.binary_arch }}${{ matrix.package_suffix }}${{ matrix.archive_ext }}"
          package_dir="${RUNNER_TEMP}/openq4-${{ needs.metadata.outputs.version_tag }}-${{ matrix.platform }}-${{ matrix.binary_arch }}${{ matrix.package_suffix }}"
          if [ ! -f "${archive_path}" ]; then
            echo "Expected package archive not found: ${archive_path}"
            exit 1
          fi
          case "$(basename "${archive_path}")" in
            *symbols*|*debugsymbols*)
              echo "Runtime package archive name must not look like a symbol/debug artifact: ${archive_path}"
              exit 1
              ;;
          esac
          if [ ! -d "${package_dir}" ]; then
            echo "Expected package directory not found: ${package_dir}"
            exit 1
          fi
          if [ "${{ matrix.platform }}" = "macos" ]; then
            symbols_archive_path="${RUNNER_TEMP}/openq4-${{ needs.metadata.outputs.version_tag }}-macos-${{ matrix.binary_arch }}${{ matrix.package_suffix }}-symbols.tar.xz"
            if [ ! -f "${symbols_archive_path}" ]; then
              echo "Expected macOS dSYM symbol archive not found: ${symbols_archive_path}"
              exit 1
            fi
            echo "symbols_archive_path=${symbols_archive_path}" >> "$GITHUB_OUTPUT"
          fi
          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"
          echo "package_dir=${package_dir}" >> "$GITHUB_OUTPUT"

      - name: Validate extracted Linux runtime archive
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          python tools/build/verify_linux_release_artifacts.py archive \
            --archive "${{ steps.package.outputs.archive_path }}" \
            --arch "${{ matrix.binary_arch }}" \
            --symbols-root "${{ steps.linux_symbols.outputs.debug_symbols_dir }}" \
            --work-root "${RUNNER_TEMP}"

      - name: Build and validate Linux AppImage
        if: matrix.platform == 'linux' && inputs.generate_linux_arm64_evidence_candidate == false
        id: appimage
        shell: bash
        run: |
          set -euo pipefail

          tools_dir="${RUNNER_TEMP}/openq4-appimage-tools/${{ matrix.binary_arch }}"
          mkdir -p "${tools_dir}"

          case "${{ matrix.binary_arch }}" in
            x64)
              appimage_arch="x86_64"
              linuxdeploy_sha256="c20cd71e3a4e3b80c3483cef793cda3f4e990aca14014d23c544ca3ce1270b4d"
              appimagetool_sha256="ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"
              ;;
            arm64)
              appimage_arch="aarch64"
              linuxdeploy_sha256="620095110d693282b8ebeb244a95b5e911cf8f65f76c88b4b47d16ae6346fcff"
              appimagetool_sha256="f0837e7448a0c1e4e650a93bb3e85802546e60654ef287576f46c71c126a9158"
              ;;
            *)
              echo "Unsupported AppImage release architecture: ${{ matrix.binary_arch }}"
              exit 1
              ;;
          esac

          linuxdeploy="${tools_dir}/linuxdeploy-${appimage_arch}.AppImage"
          appimagetool="${tools_dir}/appimagetool-${appimage_arch}.AppImage"
          runtime_file="${tools_dir}/runtime-${appimage_arch}"

          curl --fail --location --retry 3 --retry-all-errors --proto '=https' --tlsv1.2 \
            --output "${linuxdeploy}" \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-${appimage_arch}.AppImage"
          curl --fail --location --retry 3 --retry-all-errors --proto '=https' --tlsv1.2 \
            --output "${appimagetool}" \
            "https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-${appimage_arch}.AppImage"
          printf '%s  %s\n%s  %s\n' \
            "${linuxdeploy_sha256}" "${linuxdeploy}" \
            "${appimagetool_sha256}" "${appimagetool}" \
            | sha256sum --check --strict
          chmod 0755 "${linuxdeploy}" "${appimagetool}"

          # Runtime control options are handled before mounting, so this must invoke the
          # outer AppImage directly rather than the extracted appimagetool payload.
          runtime_offset="$("${appimagetool}" --appimage-offset)"
          python - "${appimagetool}" "${runtime_file}" "${runtime_offset}" <<'PY'
          import os
          import pathlib
          import sys

          source = pathlib.Path(sys.argv[1])
          destination = pathlib.Path(sys.argv[2])
          try:
              offset = int(sys.argv[3], 10)
          except ValueError as exc:
              raise SystemExit(f"appimagetool returned an invalid runtime offset: {sys.argv[3]!r}") from exc
          data = source.read_bytes()
          if offset < 11 or offset >= len(data):
              raise SystemExit(f"appimagetool runtime offset {offset} is outside the {len(data)}-byte tool")
          runtime = data[:offset]
          if runtime[:4] != b"\x7fELF" or runtime[8:11] != b"AI\x02":
              raise SystemExit("appimagetool does not contain the expected type-2 runtime prefix")
          destination.write_bytes(runtime)
          os.chmod(destination, 0o755)
          PY

          appimage_name="openq4-${{ needs.metadata.outputs.version_tag }}${{ matrix.package_suffix }}-${appimage_arch}.AppImage"
          appimage_path="${RUNNER_TEMP}/${appimage_name}"
          python tools/build/package_linux_appimage.py \
            --package-dir "${{ steps.package.outputs.package_dir }}" \
            --symbols-dir "${{ steps.linux_symbols.outputs.debug_symbols_dir }}" \
            --arch "${{ matrix.binary_arch }}" \
            --version "${{ needs.metadata.outputs.version }}" \
            --version-tag "${{ needs.metadata.outputs.version_tag }}" \
            --package-suffix="${{ matrix.package_suffix }}" \
            --source-date-epoch "${{ needs.metadata.outputs.source_date_epoch }}" \
            --linuxdeploy "${linuxdeploy}" \
            --appimagetool "${appimagetool}" \
            --runtime-file "${runtime_file}" \
            --work-root "${RUNNER_TEMP}" \
            --output "${appimage_path}"

          echo "appimage_path=${appimage_path}" >> "${GITHUB_OUTPUT}"

      - name: Validate Linux AppImage under Wayland and X11
        if: matrix.platform == 'linux' && inputs.generate_linux_arm64_evidence_candidate == false
        shell: bash
        run: |
          set -euo pipefail

          appimage="${{ steps.appimage.outputs.appimage_path }}"
          if [ -L "${appimage}" ] || [ ! -x "${appimage}" ]; then
            echo "Linux AppImage is missing or not executable: ${appimage}"
            exit 1
          fi

          runtime_root="${GITHUB_WORKSPACE}/.tmp/release-runtime/${{ matrix.binary_arch }}/appimage"
          rm -rf "${runtime_root}"
          mkdir -p "${runtime_root}/wayland" "${runtime_root}/x11"
          export APPIMAGE_EXTRACT_AND_RUN=1

          set +e
          (
            set -euo pipefail

            export XDG_RUNTIME_DIR="${runtime_root}/wayland/xdg-runtime"
            mkdir -p "${XDG_RUNTIME_DIR}"
            chmod 0700 "${XDG_RUNTIME_DIR}"

            weston_log="${runtime_root}/wayland/weston.log"
            weston --backend=headless-backend.so --socket=openq4-appimage-wayland --idle-time=0 --no-config >"${weston_log}" 2>&1 &
            weston_pid=$!
            cleanup() {
              status=$?
              kill "${weston_pid}" >/dev/null 2>&1 || true
              wait "${weston_pid}" >/dev/null 2>&1 || true
              if [ "${status}" -ne 0 ] && [ -f "${weston_log}" ]; then
                echo "AppImage Weston diagnostics:"
                cat "${weston_log}"
              fi
              exit "${status}"
            }
            trap cleanup EXIT

            for attempt in {1..30}; do
              if [ -S "${XDG_RUNTIME_DIR}/openq4-appimage-wayland" ]; then
                break
              fi
              sleep 1
            done
            if [ ! -S "${XDG_RUNTIME_DIR}/openq4-appimage-wayland" ]; then
              echo "Weston did not create the AppImage-test Wayland socket."
              exit 1
            fi

            export WAYLAND_DISPLAY=openq4-appimage-wayland
            export SDL_VIDEO_DRIVER=wayland
            export SDL_VIDEODRIVER=wayland
            export LIBGL_ALWAYS_SOFTWARE=1
            unset DISPLAY

            python tools/tests/renderer_validation_matrix.py \
              --executable "${{ steps.appimage.outputs.appimage_path }}" \
              --cases sdl3-wayland-window-lifecycle \
              --tiers auto \
              --timeout 90 \
              --basepath "" \
              --savepath "${runtime_root}/wayland/save" \
              --skip-official-pak-validation \
              --output-dir "${runtime_root}/wayland/report"
          )
          wayland_status=$?

          env -u WAYLAND_DISPLAY \
            APPIMAGE_EXTRACT_AND_RUN=1 \
            LIBGL_ALWAYS_SOFTWARE=1 \
            SDL_VIDEO_DRIVER=x11 \
            SDL_VIDEODRIVER=x11 \
            xvfb-run -a --error-file="${runtime_root}/x11/xvfb.log" \
            python tools/tests/renderer_validation_matrix.py \
              --executable "${{ steps.appimage.outputs.appimage_path }}" \
              --cases sdl3-x11-window-lifecycle \
              --tiers auto \
              --timeout 90 \
              --basepath "" \
              --savepath "${runtime_root}/x11/save" \
              --skip-official-pak-validation \
              --output-dir "${runtime_root}/x11/report"
          x11_status=$?
          set -e

          if [ "${wayland_status}" -ne 0 ] || [ "${x11_status}" -ne 0 ]; then
            echo "Linux AppImage runtime validation failed: Wayland=${wayland_status}, X11=${x11_status}."
            exit 1
          fi

      - name: Publish Linux AppImage runtime diagnostics
        if: ${{ failure() && matrix.platform == 'linux' && inputs.generate_linux_arm64_evidence_candidate == false }}
        uses: actions/upload-artifact@v6
        with:
          name: openq4-release-${{ needs.metadata.outputs.version_tag }}-linux-${{ matrix.binary_arch }}${{ matrix.package_suffix }}-appimage-diagnostics
          path: .tmp/release-runtime/${{ matrix.binary_arch }}/appimage
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Verify first-class Linux ARM64 evidence against staged and packaged bytes
        if: matrix.platform == 'linux' && matrix.binary_arch == 'arm64' && needs.metadata.outputs.linux_arm64_support_tier == 'first-class'
        env:
          EVIDENCE_SHA: ${{ needs.metadata.outputs.linux_arm64_evidence_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${EVIDENCE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "First-class Linux ARM64 build is missing an immutable accepted-evidence SHA."
            exit 1
          fi
          git fetch --quiet --no-tags --depth=1 origin "${EVIDENCE_SHA}"
          fetched_evidence_sha="$(git rev-parse --verify 'FETCH_HEAD^{commit}')"
          if [ "${fetched_evidence_sha}" != "${EVIDENCE_SHA}" ]; then
            echo "Fetched ARM64 evidence commit ${fetched_evidence_sha} does not match metadata ${EVIDENCE_SHA}."
            exit 1
          fi

          evidence_path="docs/dev/linux-arm64-first-class-evidence.toml"
          evidence_mode="$(git ls-tree "${EVIDENCE_SHA}" -- "${evidence_path}" | awk '{print $1}')"
          if [ "${evidence_mode}" != "100644" ]; then
            echo "Accepted Linux ARM64 evidence is missing or not a regular tracked file: ${evidence_path}."
            exit 1
          fi
          evidence_manifest="${RUNNER_TEMP}/linux-arm64-first-class-evidence-${EVIDENCE_SHA}.toml"
          git show "${EVIDENCE_SHA}:${evidence_path}" > "${evidence_manifest}"

          stock_sp_path="docs/dev/linux-arm64-evidence/stock-sp-report.json"
          dedicated_path="docs/dev/linux-arm64-evidence/dedicated-report.json"
          stock_sp_mode="$(git ls-tree "${EVIDENCE_SHA}" -- "${stock_sp_path}" | awk '{print $1}')"
          dedicated_mode="$(git ls-tree "${EVIDENCE_SHA}" -- "${dedicated_path}" | awk '{print $1}')"
          if [ "${stock_sp_mode}" != "100644" ] || [ "${dedicated_mode}" != "100644" ]; then
            echo "Accepted Linux ARM64 runtime reports are missing or not regular tracked files."
            exit 1
          fi
          stock_sp_report="${RUNNER_TEMP}/linux-arm64-stock-sp-report-${EVIDENCE_SHA}.json"
          dedicated_report="${RUNNER_TEMP}/linux-arm64-dedicated-report-${EVIDENCE_SHA}.json"
          git show "${EVIDENCE_SHA}:${stock_sp_path}" > "${stock_sp_report}"
          git show "${EVIDENCE_SHA}:${dedicated_path}" > "${dedicated_report}"

          python tools/build/verify_linux_arm64_release_evidence.py verify \
            --manifest "${evidence_manifest}" \
            --stock-sp-report "${stock_sp_report}" \
            --dedicated-report "${dedicated_report}" \
            --runtime-root "${GITHUB_WORKSPACE}/.install" \
            --package-dir "${{ steps.package.outputs.package_dir }}" \
            --archive "${{ steps.package.outputs.archive_path }}" \
            --expected-openq4-commit "${{ needs.metadata.outputs.openq4_source_sha }}" \
            --expected-openq4-game-commit "${{ needs.metadata.outputs.openq4_game_sha }}" \
            --expected-release-version "${{ needs.metadata.outputs.version }}" \
            --expected-version-tag "${{ needs.metadata.outputs.version_tag }}" \
            --expected-release-tag "${{ needs.metadata.outputs.release_tag }}" \
            --expected-package-filename "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64.tar.xz"

      - name: Write Linux ARM64 first-class evidence candidate
        if: matrix.platform == 'linux' && matrix.binary_arch == 'arm64' && needs.metadata.outputs.linux_arm64_support_tier == 'preview' && inputs.generate_linux_arm64_evidence_candidate
        id: arm64_evidence_candidate
        shell: bash
        run: |
          set -euo pipefail

          candidate_archive="${{ steps.package.outputs.archive_path }}"
          candidate_package_dir="${{ steps.package.outputs.package_dir }}"
          candidate_manifest="${RUNNER_TEMP}/linux-arm64-first-class-evidence-${{ needs.metadata.outputs.openq4_source_sha }}.toml"
          python tools/build/verify_linux_arm64_release_evidence.py write-candidate \
            --output "${candidate_manifest}" \
            --runtime-root "${GITHUB_WORKSPACE}/.install" \
            --package-dir "${candidate_package_dir}" \
            --archive "${candidate_archive}" \
            --expected-openq4-commit "${{ needs.metadata.outputs.openq4_source_sha }}" \
            --expected-openq4-game-commit "${{ needs.metadata.outputs.openq4_game_sha }}" \
            --expected-release-version "${{ needs.metadata.outputs.version }}" \
            --expected-version-tag "${{ needs.metadata.outputs.version_tag }}" \
            --expected-release-tag "${{ needs.metadata.outputs.release_tag }}" \
            --expected-package-filename "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64.tar.xz"

          echo "archive_path=${candidate_archive}" >> "${GITHUB_OUTPUT}"
          echo "manifest_path=${candidate_manifest}" >> "${GITHUB_OUTPUT}"

      - name: Upload Linux ARM64 first-class evidence candidate
        if: matrix.platform == 'linux' && matrix.binary_arch == 'arm64' && needs.metadata.outputs.linux_arm64_support_tier == 'preview' && inputs.generate_linux_arm64_evidence_candidate
        uses: actions/upload-artifact@v6
        with:
          name: openq4-linux-arm64-first-class-evidence-candidate-${{ needs.metadata.outputs.version_tag }}-${{ needs.metadata.outputs.openq4_source_sha }}
          path: |
            ${{ steps.arm64_evidence_candidate.outputs.archive_path }}
            ${{ steps.arm64_evidence_candidate.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 90

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            throw "Chocolatey is not available on this Windows runner, so Inno Setup could not be installed."
          }
          choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        id: windows_installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python tools/build/build_windows_installer.py `
            --package-dir "${{ steps.package.outputs.package_dir }}" `
            --version "${{ needs.metadata.outputs.version }}" `
            --version-tag "${{ needs.metadata.outputs.version_tag }}" `
            --arch "${{ matrix.binary_arch }}" `
            --source-root "${env:GITHUB_WORKSPACE}" `
            --output-dir "${env:RUNNER_TEMP}"

          $installerPath = Join-Path $env:RUNNER_TEMP "openq4-${{ needs.metadata.outputs.version_tag }}-windows-${{ matrix.binary_arch }}-setup.exe"
          if (-not (Test-Path -LiteralPath $installerPath)) {
            throw "Expected Windows installer not found: $installerPath"
          }

          "installer_path=$installerPath" >> $env:GITHUB_OUTPUT

      - name: Validate macOS app bundle
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          app_root="${{ steps.package.outputs.package_dir }}/openQ4.app"
          app_plist="${app_root}/Contents/Info.plist"
          app_pkginfo="${app_root}/Contents/PkgInfo"
          app_exec="${app_root}/Contents/MacOS/openQ4"
          app_icon="${app_root}/Contents/Resources/openQ4.icns"
          app_version="${app_root}/Contents/Resources/VERSION.txt"
          symbol_manifest="${{ steps.package.outputs.package_dir }}/SYMBOLS.txt"
          support_collector="${{ steps.package.outputs.package_dir }}/collect_macos_support_info.sh"
          client_binary="${{ steps.package.outputs.package_dir }}/openQ4-client_${{ matrix.binary_arch }}"
          dedicated_binary="${{ steps.package.outputs.package_dir }}/openQ4-ded_${{ matrix.binary_arch }}"
          game_dir="${app_root}/Contents/Resources/baseoq4"
          module_dir="${app_root}/Contents/Frameworks"
          sp_module="${module_dir}/game-sp_${{ matrix.binary_arch }}.dylib"
          mp_module="${module_dir}/game-mp_${{ matrix.binary_arch }}.dylib"

          if [ ! -f "${app_plist}" ]; then
            echo "Missing macOS app Info.plist: ${app_plist}"
            exit 1
          fi
          if [ ! -f "${app_pkginfo}" ] || [ "$(cat "${app_pkginfo}")" != "APPL????" ]; then
            echo "Missing or invalid macOS app PkgInfo: ${app_pkginfo}"
            exit 1
          fi
          if [ ! -x "${app_exec}" ]; then
            echo "Missing or non-executable macOS app executable: ${app_exec}"
            exit 1
          fi
          if [ ! -f "${app_icon}" ]; then
            echo "Missing macOS app icon: ${app_icon}"
            exit 1
          fi
          if [ ! -f "${app_version}" ]; then
            echo "Missing macOS app version manifest: ${app_version}"
            exit 1
          fi
          if [ ! -f "${symbol_manifest}" ]; then
            echo "Missing macOS symbolication manifest: ${symbol_manifest}"
            exit 1
          fi
          if [ ! -x "${support_collector}" ]; then
            echo "Missing or non-executable macOS support collector: ${support_collector}"
            exit 1
          fi
          if LC_ALL=C grep -q $'\r' "${support_collector}"; then
            echo "macOS support collector contains CRLF or carriage returns: ${support_collector}"
            exit 1
          fi
          for support_token in \
            "OPENQ4_PACKAGE_ROOT" \
            "redact_text()" \
            "contains_control_chars()" \
            "Support package root must not contain control characters" \
            "Support output directory must not contain control characters" \
            ".XXXXXX.tar.gz.tmp" \
            "MAX_SUPPORT_ARCHIVE_BYTES" \
            "sanitize_text()" \
            "limit_stream_tail()" \
            "Support report output is limited to the final" \
            "write_bounded_report()" \
            "does not dump the environment" \
            "does not launch openQ4" \
            "does not copy retail q4base PK4 assets" \
            "truncated copy failed; source was not copied" \
            "COPYFILE_DISABLE=1 tar -czf" \
            "COPYFILE_DISABLE=1 tar -tzf" \
            "Support archive is empty or unreadable before publish" \
            "Support archive validation failed before publish" \
            "Support archive is too large before publish" \
            'ln "${ARCHIVE_TMP}" "${ARCHIVE_PATH}"'
          do
            if ! grep -Fq "${support_token}" "${support_collector}"; then
              echo "macOS support collector is missing marker '${support_token}': ${support_collector}"
              exit 1
            fi
          done
          for forbidden_support_token in \
            "printenv" \
            "env >" \
            "set >" \
            "openQ4-client_arm64 >" \
            "openQ4-client_arm64 2>" \
            "openQ4-client_x64 >" \
            "openQ4-client_x64 2>" \
            "openQ4-client_x86 >" \
            "openQ4-client_x86 2>" \
            "openQ4-ded_arm64 >" \
            "openQ4-ded_arm64 2>" \
            "openQ4-ded_x64 >" \
            "openQ4-ded_x64 2>" \
            "openQ4-ded_x86 >" \
            "openQ4-ded_x86 2>" \
            "xattr -l" \
            "xattr -p" \
            "xattr -w" \
            "|| cat" \
            'tail -c "${max_bytes}" < "${source_path}" 2>/dev/null || cat'
          do
            if grep -Fq "${forbidden_support_token}" "${support_collector}"; then
              echo "macOS support collector contains forbidden privacy/no-launch pattern '${forbidden_support_token}': ${support_collector}"
              exit 1
            fi
          done
          if ! grep -Fq "symbol_archive=openq4-${{ needs.metadata.outputs.version_tag }}-macos-${{ matrix.binary_arch }}${{ matrix.package_suffix }}-symbols.tar.xz" "${symbol_manifest}"; then
            echo "macOS symbolication manifest does not point at the matching dSYM archive: ${symbol_manifest}"
            cat "${symbol_manifest}"
            exit 1
          fi
          if find "${{ steps.package.outputs.package_dir }}" -name '*.dSYM' -print -quit | grep -q .; then
            echo "macOS runtime package directory must not contain .dSYM bundles."
            find "${{ steps.package.outputs.package_dir }}" -name '*.dSYM' -print
            exit 1
          fi
          if [ ! -x "${client_binary}" ]; then
            echo "Missing or non-executable macOS client binary: ${client_binary}"
            exit 1
          fi
          if [ ! -x "${dedicated_binary}" ]; then
            echo "Missing or non-executable macOS dedicated binary: ${dedicated_binary}"
            exit 1
          fi
          if [ ! -d "${game_dir}" ]; then
            echo "Missing macOS embedded game-data directory: ${game_dir}"
            exit 1
          fi
          if [ -e "${{ steps.package.outputs.package_dir }}/baseoq4" ]; then
            echo "macOS package must not duplicate baseoq4 beside the self-contained app bundle."
            exit 1
          fi
          for module in "${sp_module}" "${mp_module}"; do
            if [ ! -x "${module}" ]; then
              echo "Missing or non-executable macOS package game module: ${module}"
              exit 1
            fi
          done
          if ! command -v otool >/dev/null 2>&1; then
            echo "otool is required for macOS runtime dependency validation."
            exit 1
          fi
          if ! command -v lipo >/dev/null 2>&1; then
            echo "lipo is required for macOS architecture validation."
            exit 1
          fi
          if ! command -v codesign >/dev/null 2>&1; then
            echo "codesign is required for macOS signature validation."
            exit 1
          fi
          macos_release_mode="${{ matrix.macos_release_mode }}"
          case "${{ matrix.binary_arch }}" in
            arm64) expected_lipo_arches="arm64" ;;
            x64) expected_lipo_arches="x86_64" ;;
            x86) expected_lipo_arches="i386" ;;
            universal2) expected_lipo_arches="arm64 x86_64" ;;
            *)
              echo "No lipo architecture mapping for ${{ matrix.binary_arch }}."
              exit 1
              ;;
          esac
          check_macos_binary_architecture() {
            binary="$1"
            actual_lipo_arches="$(lipo -archs "${binary}" | tr ' ' '\n' | LC_ALL=C sort | tr '\n' ' ' | sed 's/ $//')"
            expected_lipo_arches_sorted="$(printf '%s\n' ${expected_lipo_arches} | LC_ALL=C sort | tr '\n' ' ' | sed 's/ $//')"
            if [ "${actual_lipo_arches}" != "${expected_lipo_arches_sorted}" ]; then
              echo "macOS binary architecture mismatch: ${binary}; expected ${expected_lipo_arches_sorted}, found ${actual_lipo_arches:-<none>}."
              lipo -archs "${binary}" || true
              exit 1
            fi
          }
          check_macos_codesignature() {
            target="$1"
            if ! codesign --verify --strict --verbose=2 "${target}" >/dev/null 2>&1; then
              echo "macOS code signature verification failed: ${target}"
              codesign --verify --strict --verbose=2 "${target}" || true
              exit 1
            fi
          }
          check_macos_developer_id_signature() {
            target="$1"
            details="$(codesign -dv --verbose=4 "${target}" 2>&1)"
            if ! grep -Fq "Authority=Developer ID Application:" <<< "${details}"; then
              echo "macOS target is not Developer ID Application signed: ${target}"
              echo "${details}"
              exit 1
            fi
            if grep -Fq "Signature=adhoc" <<< "${details}"; then
              echo "macOS target is still ad-hoc signed: ${target}"
              echo "${details}"
              exit 1
            fi
            if ! grep -Fq "Runtime Version=" <<< "${details}"; then
              echo "macOS target is missing Hardened Runtime metadata: ${target}"
              echo "${details}"
              exit 1
            fi
          }
          check_macos_ad_hoc_signature() {
            target="$1"
            details="$(codesign -dv --verbose=4 "${target}" 2>&1)"
            if ! grep -Fq "Signature=adhoc" <<< "${details}"; then
              echo "macOS unsigned release target should be ad-hoc signed: ${target}"
              echo "${details}"
              exit 1
            fi
          }
          check_macos_install_name() {
            binary="$1"
            expected="$2"
            for macho_arch in ${expected_lipo_arches}; do
              actual="$(otool -arch "${macho_arch}" -D "${binary}" | sed -n '2p' | tr -d '[:space:]')"
              if [ "${actual}" != "${expected}" ]; then
                echo "macOS game module install name mismatch: ${binary} (${macho_arch}); expected ${expected}, found ${actual:-<empty>}."
                exit 1
              fi
            done
          }
          check_macos_binary_dependencies() {
            binary="$1"
            for macho_arch in ${expected_lipo_arches}; do
              deps=()
              while IFS= read -r dependency; do
                if [ -n "${dependency}" ]; then
                  deps+=("${dependency}")
                fi
              done < <(otool -arch "${macho_arch}" -L "${binary}" | sed '1d' | awk '{print $1}')

              if [[ "${binary}" == *.dylib && "${#deps[@]}" -gt 0 ]]; then
                deps=("${deps[@]:1}")
              fi

              for dependency in "${deps[@]}"; do
                case "${dependency}" in
                  /System/Library/*|/usr/lib/*)
                    ;;
                  *)
                    echo "macOS binary has unbundled non-system dependency: ${binary} (${macho_arch}) -> ${dependency}"
                    exit 1
                    ;;
                esac
              done
            done
          }
          for binary in "${app_exec}" "${client_binary}" "${dedicated_binary}" "${sp_module}" "${mp_module}"; do
            check_macos_binary_architecture "${binary}"
            check_macos_binary_dependencies "${binary}"
            check_macos_codesignature "${binary}"
            if [ "${macos_release_mode}" = "signed" ]; then
              check_macos_developer_id_signature "${binary}"
            else
              check_macos_ad_hoc_signature "${binary}"
            fi
          done
          check_macos_codesignature "${app_root}"
          if [ "${macos_release_mode}" = "signed" ]; then
            check_macos_developer_id_signature "${app_root}"
            xcrun stapler validate "${app_root}"
            spctl --assess --type execute --verbose=4 "${app_root}"
          else
            check_macos_ad_hoc_signature "${app_root}"
            echo "macOS unsigned release archive is ad-hoc signed and not notarized."
          fi
          check_macos_install_name "${sp_module}" "@loader_path/game-sp_${{ matrix.binary_arch }}.dylib"
          check_macos_install_name "${mp_module}" "@loader_path/game-mp_${{ matrix.binary_arch }}.dylib"
          check_plist_value() {
            key="$1"
            expected="$2"
            actual="$(/usr/libexec/PlistBuddy -c "Print :${key}" "${app_plist}")"
            if [ "${actual}" != "${expected}" ]; then
              echo "macOS app Info.plist ${key} is '${actual}', expected '${expected}'."
              exit 1
            fi
          }
          check_plist_value CFBundleExecutable openQ4
          check_plist_value CFBundleDisplayName openQ4
          check_plist_value CFBundleIconFile openQ4.icns
          check_plist_value CFBundleIdentifier com.darkmatter.openq4
          check_plist_value CFBundleName openQ4
          check_plist_value CFBundlePackageType APPL
          check_plist_value CFBundleShortVersionString "${{ needs.metadata.outputs.version }}"
          check_plist_value CFBundleVersion "${{ needs.metadata.outputs.version }}"
          check_plist_value LSMinimumSystemVersion 11.0
          check_plist_value LSApplicationCategoryType public.app-category.games
          check_plist_value NSPrincipalClass NSApplication
          check_plist_value NSHighResolutionCapable true
          check_plist_value NSSupportsAutomaticGraphicsSwitching true
          check_plist_value OpenQ4RuntimeLayout self-contained-v1
          if [ "${{ matrix.archive_format }}" = "dmg" ]; then
            dmg_path="${{ steps.package.outputs.archive_path }}"
            if ! command -v hdiutil >/dev/null 2>&1; then
              echo "hdiutil is required for macOS DMG validation."
              exit 1
            fi
            hdiutil verify "${dmg_path}"
            hdiutil imageinfo "${dmg_path}"
            xcrun stapler validate "${dmg_path}"
          fi

      - name: Smoke test macOS app-bundle path resolution
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          package_dir="${{ steps.package.outputs.package_dir }}"
          app_exec="${package_dir}/openQ4.app/Contents/MacOS/openQ4"
          smoke_root="${RUNNER_TEMP}/openq4-app-smoke-${{ matrix.macos_graphics_bridge }}"
          smoke_cwd="${smoke_root}/finder-style-cwd"
          smoke_save="${smoke_root}/save"
          smoke_log="${smoke_save}/baseoq4/logs/macos_release_app_smoke.log"
          smoke_timeout_marker="${smoke_root}/timed-out"
          rm -rf "${smoke_root}"
          mkdir -p "${smoke_cwd}" "${smoke_save}"

          # Launch the executable from inside the bundle while deliberately
          # using an unrelated CWD, matching Finder/LaunchServices path
          # semantics without relying on an interactive desktop session.
          (
            cd "${smoke_cwd}"
            "${app_exec}" \
              +set logFile 2 \
              +set logFileName logs/macos_release_app_smoke.log \
              +set fs_savepath "${smoke_save}" \
              +set fs_game baseoq4 \
              +set fs_validateOfficialPaks 0 \
              +set g_allowAssetlessStartup 1 \
              +set r_fullscreen 0 \
              +set r_ignoreGLErrors 0 \
              +rendererDefaultSafetySelfTest \
              +gfxInfo \
              +quit &
            app_pid=$!
            (
              sleep 90
              if kill -0 "${app_pid}" 2>/dev/null; then
                echo "macOS app-bundle smoke timed out after 90 seconds" >&2
                touch "${smoke_timeout_marker}"
                kill -TERM "${app_pid}" 2>/dev/null || true
                sleep 5
                kill -KILL "${app_pid}" 2>/dev/null || true
              fi
            ) &
            watchdog_pid=$!
            set +e
            wait "${app_pid}"
            app_status=$?
            set -e
            kill "${watchdog_pid}" 2>/dev/null || true
            wait "${watchdog_pid}" 2>/dev/null || true
            if [ -f "${smoke_timeout_marker}" ]; then
              exit 124
            fi
            exit "${app_status}"
          )

          if [ ! -f "${smoke_log}" ]; then
            echo "macOS app-bundle smoke log was not created: ${smoke_log}"
            exit 1
          fi
          grep -F "RendererDefaultSafety self-test passed" "${smoke_log}" >/dev/null
          grep -F "Filesystem paths:" "${smoke_log}" >/dev/null
          grep -F "fs_cdpath='${package_dir}/openQ4.app/Contents/Resources'" "${smoke_log}" >/dev/null

      - name: Upload artifact
        if: inputs.generate_linux_arm64_evidence_candidate == false
        uses: actions/upload-artifact@v6
        with:
          name: openq4-release-${{ needs.metadata.outputs.version_tag }}-${{ matrix.platform }}-${{ matrix.binary_arch }}${{ matrix.package_suffix }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

      - name: Upload macOS dSYM symbols
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v6
        with:
          name: openq4-release-${{ needs.metadata.outputs.version_tag }}-macos-${{ matrix.binary_arch }}${{ matrix.package_suffix }}-symbols
          path: ${{ steps.package.outputs.symbols_archive_path }}
          if-no-files-found: error

      - name: Upload Linux debug symbols
        if: matrix.platform == 'linux' && inputs.generate_linux_arm64_evidence_candidate == false
        uses: actions/upload-artifact@v6
        with:
          name: openq4-release-${{ needs.metadata.outputs.version_tag }}-linux-${{ matrix.binary_arch }}${{ matrix.package_suffix }}-debugsymbols
          path: ${{ steps.linux_symbols.outputs.debug_symbols_path }}
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.platform == 'linux' && inputs.generate_linux_arm64_evidence_candidate == false
        uses: actions/upload-artifact@v6
        with:
          name: openq4-release-${{ needs.metadata.outputs.version_tag }}-linux-${{ matrix.binary_arch }}${{ matrix.package_suffix }}-appimage
          path: ${{ steps.appimage.outputs.appimage_path }}
          if-no-files-found: error

      - name: Upload Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v6
        with:
          name: openq4-release-${{ needs.metadata.outputs.version_tag }}-windows-${{ matrix.binary_arch }}-installer
          path: ${{ steps.windows_installer.outputs.installer_path }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [metadata, builds]
    if: ${{ needs.builds.result == 'success' && inputs.generate_linux_arm64_evidence_candidate == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.openq4_source_sha }}

      - name: Fetch tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Validate release candidate source and tag target
        env:
          OPENQ4_SOURCE_SHA: ${{ needs.metadata.outputs.openq4_source_sha }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/main" ] || [ "${GITHUB_SHA}" != "${OPENQ4_SOURCE_SHA}" ]; then
            echo "Release publication is bound to the triggering refs/heads/main commit ${OPENQ4_SOURCE_SHA}; got ${GITHUB_REF} at ${GITHUB_SHA}."
            exit 1
          fi
          checkout_sha="$(git rev-parse --verify 'HEAD^{commit}')"
          if [ "${checkout_sha}" != "${OPENQ4_SOURCE_SHA}" ]; then
            echo "Release checkout ${checkout_sha} does not match triggering candidate ${OPENQ4_SOURCE_SHA}."
            exit 1
          fi
          git fetch --force origin refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${OPENQ4_SOURCE_SHA}" refs/remotes/origin/main; then
            echo "Release candidate ${OPENQ4_SOURCE_SHA} is no longer reachable from origin/main."
            exit 1
          fi
          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            existing_tag_sha="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
            if [ "${existing_tag_sha}" != "${OPENQ4_SOURCE_SHA}" ]; then
              echo "Existing tag ${RELEASE_TAG} targets ${existing_tag_sha}, not candidate ${OPENQ4_SOURCE_SHA}."
              exit 1
            fi
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: openq4-release-${{ needs.metadata.outputs.version_tag }}-*
          path: ${{ runner.temp }}/release-artifacts
          merge-multiple: true

      - name: Verify platform archives
        id: release_assets
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/release-artifacts"
          if [ ! -d "${artifact_dir}" ]; then
            echo "Artifact directory is missing: ${artifact_dir}"
            exit 1
          fi

          expected=(
            "openq4-${{ needs.metadata.outputs.version_tag }}-windows-x64.zip"
            "openq4-${{ needs.metadata.outputs.version_tag }}-windows-x64-setup.exe"
            "openq4-${{ needs.metadata.outputs.version_tag }}-windows-arm64.zip"
            "openq4-${{ needs.metadata.outputs.version_tag }}-windows-arm64-setup.exe"
            "openq4-${{ needs.metadata.outputs.version_tag }}-linux-x64.tar.xz"
            "openq4-${{ needs.metadata.outputs.version_tag }}-linux-x64-debugsymbols.tar.xz"
            "openq4-${{ needs.metadata.outputs.version_tag }}-x86_64.AppImage"
          )

          echo "${{ needs.metadata.outputs.linux_arm64_release_reason }}"
          echo "${{ needs.metadata.outputs.macos_release_reason }}"
          if [ "${{ needs.metadata.outputs.linux_arm64_support_tier }}" = "preview" ]; then
            expected+=(
              "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64-preview.tar.xz"
              "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64-preview-debugsymbols.tar.xz"
              "openq4-${{ needs.metadata.outputs.version_tag }}-preview-aarch64.AppImage"
            )
          else
            expected+=(
              "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64.tar.xz"
              "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64-debugsymbols.tar.xz"
              "openq4-${{ needs.metadata.outputs.version_tag }}-aarch64.AppImage"
            )
          fi
          if [ "${{ needs.metadata.outputs.macos_signed_release_enabled }}" = "true" ]; then
            expected+=(
              "openq4-${{ needs.metadata.outputs.version_tag }}-macos-arm64-opengl.dmg"
              "openq4-${{ needs.metadata.outputs.version_tag }}-macos-arm64-opengl-symbols.tar.xz"
              "openq4-${{ needs.metadata.outputs.version_tag }}-macos-arm64-metal.dmg"
              "openq4-${{ needs.metadata.outputs.version_tag }}-macos-arm64-metal-symbols.tar.xz"
            )
          else
            expected+=(
              "openq4-${{ needs.metadata.outputs.version_tag }}-macos-arm64-opengl-unsigned.tar.gz"
              "openq4-${{ needs.metadata.outputs.version_tag }}-macos-arm64-opengl-unsigned-symbols.tar.xz"
              "openq4-${{ needs.metadata.outputs.version_tag }}-macos-arm64-metal-unsigned.tar.gz"
              "openq4-${{ needs.metadata.outputs.version_tag }}-macos-arm64-metal-unsigned-symbols.tar.xz"
            )
          fi

          asset_manifest="${RUNNER_TEMP}/openq4-release-assets.txt"
          expected_args=()
          for package_file in "${expected[@]}"; do
            expected_args+=(--expected "${package_file}")
          done
          python tools/build/verify_release_asset_set.py \
            --artifact-dir "${artifact_dir}" \
            --manifest "${asset_manifest}" \
            "${expected_args[@]}"
          echo "asset_manifest=${asset_manifest}" >> "${GITHUB_OUTPUT}"

      - name: Revalidate accepted Linux ARM64 archive after artifact download
        if: needs.metadata.outputs.linux_arm64_support_tier == 'first-class'
        env:
          EXPECTED_ARM64_ARCHIVE_SHA256: ${{ needs.metadata.outputs.linux_arm64_archive_sha256 }}
          ARM64_ARCHIVE_FILENAME: openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64.tar.xz
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${EXPECTED_ARM64_ARCHIVE_SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "First-class Linux ARM64 publication is missing a canonical accepted archive SHA-256."
            exit 1
          fi
          if [[ ! "${ARM64_ARCHIVE_FILENAME}" =~ ^openq4-[A-Za-z0-9._+-]+-linux-arm64\.tar\.xz$ ]]; then
            echo "First-class Linux ARM64 publication resolved an unsafe archive filename: ${ARM64_ARCHIVE_FILENAME@Q}"
            exit 1
          fi

          arm64_archive="${RUNNER_TEMP}/release-artifacts/${ARM64_ARCHIVE_FILENAME}"
          if [ -L "${arm64_archive}" ] || [ ! -f "${arm64_archive}" ]; then
            echo "Accepted Linux ARM64 archive is missing or not a regular file: ${arm64_archive}"
            exit 1
          fi
          actual_arm64_archive_sha256="$(sha256sum -- "${arm64_archive}" | awk '{print $1}')"
          if [ "${actual_arm64_archive_sha256}" != "${EXPECTED_ARM64_ARCHIVE_SHA256}" ]; then
            echo "Downloaded Linux ARM64 archive SHA-256 ${actual_arm64_archive_sha256} does not match accepted evidence ${EXPECTED_ARM64_ARCHIVE_SHA256}."
            exit 1
          fi
          echo "Accepted Linux ARM64 archive reverified after artifact download: ${actual_arm64_archive_sha256}"

      - name: Generate changelog
        env:
          LINUX_ARM64_RELEASE_REASON: ${{ needs.metadata.outputs.linux_arm64_release_reason }}
          LINUX_ARM64_SUPPORT_TIER: ${{ needs.metadata.outputs.linux_arm64_support_tier }}
        shell: bash
        run: |
          set -euo pipefail

          python tools/build/generate_release_changelog.py \
            --version "${{ needs.metadata.outputs.version }}" \
            --version-tag "${{ needs.metadata.outputs.version_tag }}" \
            --release-tag "${{ needs.metadata.outputs.release_tag }}" \
            --release-scale "${{ needs.metadata.outputs.release_scale }}" \
            --release-reason "${{ needs.metadata.outputs.release_reason }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --source-root "${GITHUB_WORKSPACE}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --output "${RUNNER_TEMP}/release-changelog.md"

          printf '\n## Linux ARM64 Support\n\n%s\n' \
            "${LINUX_ARM64_RELEASE_REASON}" >> "${RUNNER_TEMP}/release-changelog.md"

          if [ "${LINUX_ARM64_SUPPORT_TIER}" = "first-class" ]; then
            if grep -Eiqz \
              'linux[[:space:]_-]+arm64.{0,240}preview|preview.{0,240}linux[[:space:]_-]+arm64' \
              "${RUNNER_TEMP}/release-changelog.md"; then
              echo "First-class Linux ARM64 release notes still contain preview claims:"
              grep -Ein 'linux[[:space:]_-]+arm64|preview' \
                "${RUNNER_TEMP}/release-changelog.md" | head -20 || true
              exit 1
            fi
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINUX_ARM64_SUPPORT_TIER: ${{ needs.metadata.outputs.linux_arm64_support_tier }}
          OPENQ4_SOURCE_SHA: ${{ needs.metadata.outputs.openq4_source_sha }}
          RELEASE_ASSET_MANIFEST: ${{ steps.release_assets.outputs.asset_manifest }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.metadata.outputs.release_tag }}"
          name="${{ needs.metadata.outputs.release_name }}"
          target="${OPENQ4_SOURCE_SHA}"
          notes="${RUNNER_TEMP}/release-changelog.md"
          assets_dir="${RUNNER_TEMP}/release-artifacts"

          if [ -L "${RELEASE_ASSET_MANIFEST}" ] || [ ! -f "${RELEASE_ASSET_MANIFEST}" ]; then
            echo "Verified release asset manifest is missing or not a regular file: ${RELEASE_ASSET_MANIFEST}"
            exit 1
          fi
          mapfile -t asset_names < "${RELEASE_ASSET_MANIFEST}"
          assets=()
          for asset_name in "${asset_names[@]}"; do
            if [[ ! "${asset_name}" =~ ^openq4-[A-Za-z0-9._+-]+$ ]] || [[ "${asset_name}" == *..* ]]; then
              echo "Verified release asset manifest contains an unsafe filename: ${asset_name@Q}"
              exit 1
            fi
            asset_path="${assets_dir}/${asset_name}"
            if [ -L "${asset_path}" ] || [ ! -f "${asset_path}" ]; then
              echo "Verified release asset disappeared or is not a regular file: ${asset_path}"
              exit 1
            fi
            assets+=("${asset_path}")
          done

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "Verified release asset whitelist is empty."
            exit 1
          fi

          if git show-ref --verify --quiet "refs/tags/${tag}"; then
            existing_tag_sha="$(git rev-parse --verify "refs/tags/${tag}^{commit}")"
            if [ "${existing_tag_sha}" != "${target}" ]; then
              echo "Refusing to update release ${tag}: tag target ${existing_tag_sha} differs from ${target}."
              exit 1
            fi
          fi

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [ "${LINUX_ARM64_SUPPORT_TIER}" = "preview" ]; then
              stale_linux_arm64_assets=(
                "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64.tar.xz"
                "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64-debugsymbols.tar.xz"
                "openq4-${{ needs.metadata.outputs.version_tag }}-aarch64.AppImage"
              )
            else
              stale_linux_arm64_assets=(
                "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64-preview.tar.xz"
                "openq4-${{ needs.metadata.outputs.version_tag }}-linux-arm64-preview-debugsymbols.tar.xz"
                "openq4-${{ needs.metadata.outputs.version_tag }}-preview-aarch64.AppImage"
              )
            fi
            mapfile -t existing_release_assets < <(
              gh release view "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json assets \
                --jq '.assets[].name'
            )
            for stale_asset in "${stale_linux_arm64_assets[@]}"; do
              if printf '%s\n' "${existing_release_assets[@]}" | grep -Fxq -- "${stale_asset}"; then
                echo "Removing stale opposite-tier Linux ARM64 release asset: ${stale_asset}"
                gh release delete-asset "${tag}" "${stale_asset}" \
                  --repo "${GITHUB_REPOSITORY}" \
                  --yes
              fi
            done

            mapfile -t remaining_release_assets < <(
              gh release view "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json assets \
                --jq '.assets[].name'
            )
            for existing_asset in "${remaining_release_assets[@]}"; do
              approved=0
              for asset_name in "${asset_names[@]}"; do
                if [ "${existing_asset}" = "${asset_name}" ]; then
                  approved=1
                  break
                fi
              done
              if [ "${approved}" -ne 1 ]; then
                printf 'Existing release contains an unapproved asset: %q\n' "${existing_asset}"
                exit 1
              fi
            done

            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${target}" \
              --title "${name}" \
              --notes-file "${notes}"
            gh release upload "${tag}" "${assets[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${target}" \
              --title "${name}" \
              --notes-file "${notes}"
          fi

          mapfile -t published_release_assets < <(
            gh release view "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name'
          )
          if [ "${#published_release_assets[@]}" -ne "${#asset_names[@]}" ]; then
            echo "Published release asset count does not match the approved whitelist."
            exit 1
          fi
          for published_asset in "${published_release_assets[@]}"; do
            approved=0
            for asset_name in "${asset_names[@]}"; do
              if [ "${published_asset}" = "${asset_name}" ]; then
                approved=1
                break
              fi
            done
            if [ "${approved}" -ne 1 ]; then
              printf 'Published release contains an unapproved asset: %q\n' "${published_asset}"
              exit 1
            fi
          done
          for asset_name in "${asset_names[@]}"; do
            present=0
            for published_asset in "${published_release_assets[@]}"; do
              if [ "${published_asset}" = "${asset_name}" ]; then
                present=1
                break
              fi
            done
            if [ "${present}" -ne 1 ]; then
              echo "Published release is missing approved asset: ${asset_name}"
              exit 1
            fi
          done

          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .id)"
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -f prerelease=false \
            -f draft=false >/dev/null

          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
          published_tag_sha="$(git rev-parse --verify "refs/tags/${tag}^{commit}")"
          if [ "${published_tag_sha}" != "${target}" ]; then
            echo "Published tag ${tag} targets ${published_tag_sha}, expected ${target}."
            exit 1
          fi
          published_release_target="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .target_commitish)"
          if [ "${published_release_target}" != "${target}" ]; then
            echo "Published release ${tag} records target ${published_release_target}, expected ${target}."
            exit 1
          fi

  discord:
    name: Announce On Discord
    needs: [metadata, release]
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Send release embed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          DISCORD_RELEASE_EMOJI: ${{ vars.DISCORD_RELEASE_EMOJI || '<:quake4:1425986174941397105>' }}
          DISCORD_RELEASE_MENTIONS: ${{ vars.DISCORD_RELEASE_MENTIONS || '<@&1425985498693898260> <@&1390287267276525628>' }}
          DISCORD_FEEDBACK_CHANNEL: ${{ vars.DISCORD_FEEDBACK_CHANNEL || '<#1509926146018513077>' }}
          DISCORD_RELEASE_AVATAR_URL: ${{ vars.DISCORD_RELEASE_AVATAR_URL || 'https://raw.githubusercontent.com/themuffinator/OpenQ4/main/assets/img/avatar.png' }}
        shell: bash
        run: |
          set -euo pipefail
          node .github/scripts/announce-release-discord.mjs
