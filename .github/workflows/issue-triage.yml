name: Issue triage

on:
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write
  models: read

concurrency:
  group: issue-triage-${{ github.event.issue.id }}
  cancel-in-progress: false

jobs:
  triage:
    name: Automated issue triage
    if: ${{ github.event.action == 'opened' && github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_TRIAGE_AI_PROVIDER: ${{ vars.ISSUE_TRIAGE_AI_PROVIDER || 'github-models' }}
      ISSUE_TRIAGE_MODEL: ${{ vars.ISSUE_TRIAGE_MODEL || '' }}
      ISSUE_TRIAGE_GITHUB_MODELS_ORG: ${{ vars.ISSUE_TRIAGE_GITHUB_MODELS_ORG || '' }}
      ISSUE_TRIAGE_OPENAI_BASE_URL: ${{ vars.ISSUE_TRIAGE_OPENAI_BASE_URL || '' }}
      ISSUE_TRIAGE_MODELS_TOKEN: ${{ secrets.ISSUE_TRIAGE_MODELS_TOKEN }}
      ISSUE_TRIAGE_DRY_RUN: ${{ vars.ISSUE_TRIAGE_DRY_RUN || 'false' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run issue triage
        shell: bash
        run: |
          set -euo pipefail
          node .github/scripts/issue-triage.mjs
