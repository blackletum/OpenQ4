name: Push Verification

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openq4-push-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  script-smoke:
    name: Validation Script Smoke
    runs-on: ubuntu-24.04
    env:
      OPENQ4_GAMELIBS_REPO: ${{ github.workspace }}/../openQ4-GameLibs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch openQ4-GameLibs
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/themuffinator/openQ4-GameLibs.git "${OPENQ4_GAMELIBS_REPO}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Check validation script syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile tools/validation/openq4_validate.py tools/tests/renderer_validation_matrix.py tools/tests/linux_arm64_ci_coverage.py tools/tests/linux_highdpi_mouse.py tools/tests/linux_vsync_support.py tools/tests/loading_continue_input.py
          bash -n tools/build/meson_setup.sh
          bash -n tools/validation/validate_push.sh
          bash -n tools/validation/validate_pr.sh
          python tools/tests/hdr_postprocess_math.py
          python tools/tests/linux_arm64_ci_coverage.py
          python tools/tests/linux_highdpi_mouse.py
          python tools/tests/linux_vsync_support.py
          python tools/tests/loading_continue_input.py

      - name: Dry-run push profile
        shell: bash
        run: |
          set -euo pipefail
          bash tools/validation/validate_push.sh --dry-run

  posix-builds:
    name: ${{ matrix.name }}
    needs: script-smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      OPENQ4_GAMELIBS_REPO: ${{ github.workspace }}/../openQ4-GameLibs
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux Push Verification
            os: ubuntu-24.04
            artifact_name: linux-x64
            runtime_smoke: false
          - name: Linux ARM64 Push Verification
            os: ubuntu-24.04-arm
            artifact_name: linux-arm64
            runtime_smoke: true
          - name: macOS Push Verification
            os: macos-15
            artifact_name: macos
            runtime_smoke: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch openQ4-GameLibs
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/themuffinator/openQ4-GameLibs.git "${OPENQ4_GAMELIBS_REPO}"
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Meson and Ninja
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install meson ninja

      - name: Install Linux native dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y \
              libasound2-dev \
              libdbus-1-dev \
              libdecor-0-dev \
              libdrm-dev \
              libegl1-mesa-dev \
              libfribidi-dev \
              libgbm-dev \
              libgl1-mesa-dri \
              libgl1-mesa-dev \
              libglx-mesa0 \
              libibus-1.0-dev \
              libjack-dev \
              libopenal-dev \
              libpipewire-0.3-dev \
              libpulse-dev \
              libsndio-dev \
              libthai-dev \
              libudev-dev \
              libwayland-dev \
              libx11-dev \
              libxcursor-dev \
              libxext-dev \
              libxfixes-dev \
              libxi-dev \
              libxkbcommon-dev \
              libxrandr-dev \
              libxss-dev \
              libxtst-dev \
              libxxf86dga-dev \
              libxxf86vm-dev \
              xvfb; then
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to install Linux native dependencies after ${attempt} attempts."
              exit 1
            fi

            echo "Linux dependency installation attempt ${attempt} failed; retrying in 10 seconds..."
            sleep 10
          done

      - name: Run push verification
        shell: bash
        run: |
          set -euo pipefail
          validation_args=(--install --fail-on-dirty)
          if [[ "${{ matrix.runtime_smoke }}" == "true" ]]; then
            validation_args+=(
              --runtime
              --runtime-cases renderer-default-safety-selftest
              --runtime-tiers auto
              --runtime-basepath ""
              --runtime-skip-official-pak-validation
            )
            env LIBGL_ALWAYS_SOFTWARE=1 SDL_VIDEO_DRIVER=x11 SDL_VIDEODRIVER=x11 xvfb-run -a bash tools/validation/validate_push.sh "${validation_args[@]}"
          else
            bash tools/validation/validate_push.sh "${validation_args[@]}"
          fi

      - name: Publish staged payload
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: push-${{ matrix.artifact_name }}-payload
          path: .install
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Publish renderer validation reports
        if: always() && matrix.runtime_smoke == true
        uses: actions/upload-artifact@v6
        with:
          name: push-${{ matrix.artifact_name }}-renderer-validation
          path: .tmp/renderer-validation
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

  windows-build:
    name: Windows Push Verification
    needs: script-smoke
    runs-on: windows-2025-vs2026
    timeout-minutes: 90
    env:
      OPENQ4_GAMELIBS_REPO: ${{ github.workspace }}/../openQ4-GameLibs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch openQ4-GameLibs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git clone --depth 1 https://github.com/themuffinator/openQ4-GameLibs.git "$env:OPENQ4_GAMELIBS_REPO"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Meson and Ninja
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip
          python -m pip install meson ninja

      - name: Prepare OpenAL Soft (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $outputRoot = Join-Path $env:GITHUB_WORKSPACE ".tmp/openal-soft-x64"
          $env:OPENQ4_VS_TARGET_ARCH = "x64"
          powershell -ExecutionPolicy Bypass -File tools/build/prepare_windows_openal.ps1 -Architecture "x64" -OutputRoot $outputRoot
          "OPENQ4_OPENAL_ROOT=$outputRoot" >> $env:GITHUB_ENV

      - name: Run push verification
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/validation/validate_push.ps1 --install --fail-on-dirty

      - name: Publish staged payload
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: push-windows-payload
          path: .install
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true
