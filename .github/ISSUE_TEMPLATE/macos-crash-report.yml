name: Experimental macOS crash report
description: Report an Apple Silicon/arm64 macOS crash, including issue #73 style startup crashes.
title: "[macOS crash]: "
labels:
  - macOS
  - crash
  - experimental-support
body:
  - type: markdown
    attributes:
      value: |
        macOS support is experimental. Complete reports are especially useful because the maintainer may not have access to macOS hardware.

        If this looks like GitHub issue #73, please attach full terminal output as text, not only a screenshot. The most useful reports include both the terminal transcript and the saved `openq4.log`.
  - type: input
    id: version
    attributes:
      label: openQ4 version
      description: Example: 0.6.8.
      placeholder: "0.6.8"
    validations:
      required: true
  - type: input
    id: artifact
    attributes:
      label: Package artifact name
      description: Paste the exact downloaded file or folder name.
      placeholder: "openq4-0.6.8-macos-arm64-metal.dmg"
    validations:
      required: true
  - type: dropdown
    id: bridge
    attributes:
      label: macOS package variant
      options:
        - OpenGL
        - Metal bridge
        - Both OpenGL and Metal bridge
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: launch_method
    attributes:
      label: Launch method
      options:
        - openQ4.app
        - openQ4-client_arm64 from Terminal
        - openQ4-ded_arm64 from Terminal
        - Both openQ4.app and openQ4-client_arm64
        - Other
    validations:
      required: true
  - type: input
    id: macos_version
    attributes:
      label: macOS version and build
      description: Paste `sw_vers` output when possible.
      placeholder: "macOS 15.5 build 24F74, or macOS 26.0 build ..."
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware model
      description: Include chip generation and memory when known.
      placeholder: "MacBook Pro, Apple M4 Max, 48 GB"
    validations:
      required: true
  - type: textarea
    id: terminal_output
    attributes:
      label: Full terminal output
      description: Paste the complete terminal output as text, not a screenshot. Include the lines before and after `R_InitOpenGL`, `R_ReloadARBPrograms`, `using ARB2 renderSystem`, any `ARB2 interaction bypass` marker, dedicated-server startup if applicable, and any `fatal signal SIGSEGV`.
      render: text
    validations:
      required: true
  - type: textarea
    id: openq4_log
    attributes:
      label: Saved openq4.log
      description: Attach or paste `~/Library/Application Support/openQ4/baseoq4/logs/openq4.log` when it exists.
      render: text
    validations:
      required: false
  - type: input
    id: openal_vendor
    attributes:
      label: OpenAL vendor
      description: Paste the `OpenAL vendor:` line from `openq4.log` or `logs/openal-summary.txt` when available.
      placeholder: "OpenAL vendor: Apple Computer Inc."
    validations:
      required: false
  - type: input
    id: openal_renderer
    attributes:
      label: OpenAL renderer
      description: Paste the `OpenAL renderer:` line from `openq4.log` or `logs/openal-summary.txt` when available.
      placeholder: "OpenAL renderer: Software"
    validations:
      required: false
  - type: input
    id: openal_device
    attributes:
      label: OpenAL device name
      description: Paste the `OpenAL requested device:`, `OpenAL default device:`, or `OpenAL active device:` line from `openq4.log`.
      placeholder: "OpenAL active device: ..."
    validations:
      required: false
  - type: textarea
    id: openal_efx_lines
    attributes:
      label: OpenAL EFX warnings
      description: Paste any `OpenAL EFX ...` warning/status lines from `openq4.log` or `logs/openal-summary.txt`.
      render: text
    validations:
      required: false
  - type: textarea
    id: crash_report
    attributes:
      label: macOS crash report
      description: Attach the matching `.ips` or `.crash` report from `~/Library/Logs/DiagnosticReports` when available.
    validations:
      required: false
  - type: checkboxes
    id: package_layout
    attributes:
      label: Package layout
      description: The current package must stay together as one adjacent root.
      options:
        - label: I kept `openQ4.app`, `baseoq4/`, the loose client/dedicated binaries, and runtime support files together.
        - label: I moved only `openQ4.app` somewhere else, such as `/Applications`.
  - type: textarea
    id: support_archive
    attributes:
      label: Support-info archive
      description: If your package includes `collect_macos_support_info.sh`, run it from the package root and attach the generated `openq4-macos-support-*.tar.gz` after reviewing its contents. Useful files include `system/rosetta.txt`, `logs/renderer-summary.txt`, `package/binary-architecture.txt`, `package/dylib-dependencies.txt`, `package/signing.txt`, and `package/quarantine.txt`.
    validations:
      required: false
