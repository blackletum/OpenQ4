// OpenQ4 shadow map preset: best-quality settings for current renderer.
// Executed by VS Code launch configs.

// Core shadow-map path
seta r_shadows "1"
seta r_useShadowMapping "1"

// Shadow map quality (higher resolution + filtered lookups)
seta r_shadowMapImageSize "4096"
seta r_shadowMapSoftShadows "1"
seta r_shadowMapPerforatedCasters "1"
seta r_shadowMapPointLight "1"
seta r_shadowMapPointMaxRadius "1024"

// Bias/caster tuning for high quality
seta r_shadowMapOccluderFacing "2"
seta r_shadowMapDepthBiasScale "0.9997"
seta r_shadowMapPolygonFactor "2.0"
seta r_shadowMapPolygonOffset "4.0"

// CSM compatibility placeholders.
// NOTE: current OpenQ4 branch does not yet consume these in renderer code.
seta r_shadowMapSplits "4"
seta r_shadowMapSplitWeight "0.90"
seta r_shadowMapSunDepthBiasScale "0.9997"

// Shadow-map debug tools:
// < 0 = normal shadow compare, 0..1 = force constant visibility.
seta r_shadowMapDebugForceVisibility "-1"
// 0 = off, 1 = periodic summary, 2 = per-light verbose.
seta r_shadowMapDebugStats "0"
