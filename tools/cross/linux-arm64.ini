[binaries]
c = 'aarch64-linux-gnu-gcc'
cpp = 'aarch64-linux-gnu-g++'
ar = 'aarch64-linux-gnu-ar'
strip = 'aarch64-linux-gnu-strip'
pkg-config = 'pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'

[properties]
# This file describes a Debian/Ubuntu multiarch builder.  Keep target package
# metadata out of the build-machine pkg-config search path.  /usr/share is
# retained for architecture-independent protocol metadata.
pkg_config_libdir = ['/usr/lib/aarch64-linux-gnu/pkgconfig', '/usr/aarch64-linux-gnu/lib/pkgconfig', '/usr/share/pkgconfig']

# Configure and compilation do not execute target programs.  Runtime tests
# belong on a native Linux ARM64 runner; add an exe_wrapper only for a local,
# explicitly emulated diagnostic build.
needs_exe_wrapper = true
